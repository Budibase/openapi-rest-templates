openapi: 3.0.3
info:
  title: Gong Public API
  version: 1.0.0
  description: Conversation intelligence data for calls, transcripts, users, scorecards, stats, and CRM activity. Default rate limits are 3 API calls per second and 10,000 API calls per day.
servers:
- url: https://{gongBaseUrl}
  variables:
    gongBaseUrl:
      default: api.gong.io
      description: Use the Gong API base URL shown in Gong company API settings.
tags:
- name: Calls
  description: "<h3>Gong’s “Calls” API endpoints allow you to:</h3>\n<ul>\n<li>\nRequest calls details from Gong\n</li>\n<li>\nUpload new calls to Gong\n</li>\n<li>\nUpdate Gong Calls with new media\n</li>\n</ul>\n<h3>The requested calls may contain the following call details:</h3>\n<ul>\n<li>\n<b>Meta Data</b> (Basic details such as call date, title, call URL, etc)\n</li>\n<li>\n<b>Parties</b> (A list of the call's participants)\n</li>\n<li>\n<b>Media</b> (The media urls of the call)\n</li>\n<li>\n<b>Content</b> (Analysis of the interaction content)\n<ul>\n<li>\nAction Items (A list of action items)\n</li>\n<li>\nStructure (A list of the agenda of each part of the call)\n</li>\n<li>\nTopics (A list of topics and their durations)\n</li>\n<li>\nTrackers (A list of trackers found in the call. Trackers are collections of phrases defined in Gong for this company)\n</li>\n<li>\nPhrases (A list of occurrence counters for each specific phrase within the tracker (e.g., Amazon, Walmart))\n</li>\n<li>\nContext (A list of links to external systems such as CRM, Dialer, Case Management, etc)\n</li>\n</ul>\n</li>\n<li>\n<b>Interaction</b> (Metrics collected around the interaction during the call)\n<ul>\n<li>\nInteraction Stats (A list of interaction statistics. Applicable values: 'Talk Ratio', 'Longest Monologue', \n'Longest Customer Story', 'Interactivity', 'Patience')\n</li>\n<li>\nQuestions (Question counts of the call)\n</li>\n<li>\nSpeakers (A list of the talk duration per speaker)\n</li>\n<li>\nVideo (A list of video statistics about what's presented and for how long)\n</li>\n</ul>\n</li>\n<li>\n<b>Collaboration</b> (Collaboration information added to the call)\n<ul>\n<li>\nPublic Comments (A list of public comments)\n</li>\n</ul>\n</li>\n<li>\n<b>Context</b> (A list of links to external systems such as CRM, Dialer, Case Management, etc)\n<ul>\n<li>\nObjects (List of objects within the external system)\n</li>\n<li>\nFields (Object fields)\n</li>\n</ul>\n</li>\n</ul>\n"
- name: Users
  description: |
    <h3>Gong’s “Users” API endpoints allow you to:</h3>
    <ul>
    <li>
    Request a list of all the company's users with details
    </li>
    <li>
    Request a specific user’s history from Gong
    </li>
    </ul>
    <h3>The requested users may contain the following details:</h3>
    <ul>
    <li>
    If the Gong user is active or not.
    </li>
    <li>
    Creation time of the Gong user.
    </li>
    <li>
    The email address of the Gong user.
    </li>
    <li>
    List of email address aliases of the Gong user.
    </li>
    <li>
    The extension number of the Gong user.
    </li>
    <li>
    The first name of the Gong user.
    </li>
    <li>
    The last name of the Gong user.
    </li>
    <li>
    Gong's unique numeric identifier for the user.
    </li>
    <li>
    The manager ID of the Gong user.
    </li>
    <li>
    The Gong recording consent meeting link.
    </li>
    <li>
    The list of personal meeting URLs of the Gong user.
    </li>
    <li>
    The phone number of the Gong user.
    </li>
    <li>
    The job title of the Gong user.
    </li>
    <li>
    The user's settings.
    <ul>
    <li>
    If the team member is set to import emails by Gong.
    </li>
    <li>
    If the team member is set to prevent import of emails by Gong.
    </li>
    <li>
    If the invitation of this user to a web conference will prevent its recording (even if other users invited are set to record).
    </li>
    <li>
    If the team member is set to import telephony calls by Gong.
    </li>
    <li>
    If the team member is set to be recorded by Gong.
    </li>
    </ul>
    </li>
    <li>
    The User's settings history.
    <ul>
    <li>
    The user capability that was changed.
    </li>
    <li>
    The date and time the action was set.
    </li>
    <li>
    The new value that was set.
    </li>
    </ul>
    </li>
    </ul>
- name: Stats
  description: |
    <h3>Gong’s “Stats” API endpoints allow you to:</h3>
    <ul>
    <li>
    Request user activity
    </li>
    <li>
    Request scorecards activity
    </li>
    <li>
    Request interaction stats on calls that have Whisper turned on
    </li>
    </ul>
    <h3>The requested user activity may contain the following details:</h3>
    <ul>
    <li>
    <b>Calls Hosted:</b> The number of recorded calls this user hosted.
    </li>
    <li>
    <b>Call Participated:</b> The number of calls in which this user is a participant (not host).
    </li>
    <li>
    <b>Calls Reviewed:</b> The number of calls in which someone pressed the "Mark as reviewed".
    </li>
    <li>
    <b>Calls Listened:</b> The number of other users' calls the user listened to.
    </li>
    <li>
    <b>Call Shared Outside:</b> The number of calls the user shared with others outside the company.
    </li>
    <li>
    <b>Call Shared Inside:</b> The number of calls the user shared with others inside the company.
    </li>
    <li>
    <b>Own Calls Listened:</b> The number of the user's own calls the user listened to.
    </li>
    <li>
    <b>Comment Given:</b> The number of calls in which a user gave at least one comment.
    </li>
    <li>
    <b>Comment Received:</b> The number of calls in which a user received at least one comment on the users calls.
    </li>
    <li>
    <b>Feedback Given:</b> The number of recorded calls the user gave feedback on.
    </li>
    <li>
    <b>Feedback Received:</b> The number of recorded calls the user received feedback on.
    </li>
    <li>
    <b>Feedback Requested:</b> The number of recorded calls the user requested feedback on.
    </li>
    <li>
    <b>Scorecard Filled:</b> The number of calls in which someone filled a scorecard on the user's calls.
    </li>
    <li>
    <b>Scorecards Completed:</b> The number of scorecards the user completed.
    </li>
    <li>
    <b>Scorecards Answers:</b> The answers in the answered scorecard.
    </li>
    <li>
    <b>Whisper:</b> Person Interaction Stats (List of user interaction stats. Applicable values: 'Talk Ratio',
     'Longest Monologue', 'Longest Customer Story', 'Interactivity', 'Question Rate', 'Patience').
    </li>
    </ul>
- name: Entities (Beta)
  description: |-
    <h3>Gong's “Entity” endpoints allow you to:</h3>
    <ul>
    <li>
    Ask questions in natural language about CRM entities (accounts, contacts, deals, leads) and get AI-generated insights based on data from calls and emails.
    </li>
    <li>
    Generate pre-configured briefs on CRM entities. Briefs are set up in the Agent Studio in Gong.
    </li>
    </ul>
    The response includes the generated answer or brief and the calls and emails used to generate it. It also includes information about the specific parts of those calls or emails that provided the evidence for the AI-generated content.
- name: Settings
  description: |
    <h3>Gong’s “Settings” API endpoints allow you to:</h3>
    <ul>
    <li>
    Request all the scorecards within the Gong system.
    </li>
    <li>
    Request all the workspaces including their details.
    </li>
    </ul>
- name: Data Privacy
  description: |
    <h3>Gong’s “Data Privacy” API endpoints allow you to:</h3>
    <ul>
    <li>
    Request all references to an email address.
    </li>
    <li>
    Request all references to a phone number.
    </li>
    <li>
    Delete the email address, and all associated elements.
    </li>
    <li>
    Delete the phone number, and all associated elements.
    </li>
    </ul>
- name: Library
  description: |
    <h3>Gong’s “Library” API endpoints allow you to:</h3>
    <ul>
    <li>
    Request all the calls in a specific folder.
    </li>
    <li>
    Request all the Library folders. We do not allow retrieval of either private or archived folders.
    </li>
    </ul>
- name: CRM
  description: |-
    <style>.public-api-info {    background: rgb(222, 235, 255);}.public-api-tip {    background: rgb(227, 252, 239);}.public-api-parameter {    background: rgba(9,30,66,0.08);}.public-api-note {    background: rgb(234, 230, 255);}.public-api-important {    background: rgb(255, 250, 230);}.public-api-critical {    background: rgb(255, 235, 230);}table, th, td {  border: 1px solid gray;  border-collapse: collapse;}th, td {  padding: 5px;}th {  text-align: left;}img {  border: 2px solid #D3D5D9;}</style><p>If you are using the deprecated endpoints, download the <a href="/r/img/permanent/crm_api_deprecated_endpoints.pdf" target="_blank">PDF file</a>.</p><h1>What does the CRM API do?</h1><p>This API enables integration with CRMs that are not natively integrated with Gong, so that Gong can provide you with its full capabilities based on your CRM data. This includes:</p><ul>  <li>Pipeline review and forecast</li>  <li>Narrow down conversations (calls and emails) by customer data for coaching and analytics</li>  <li>Track initiatives and adoption based on accounts and opportunities</li></ul><p>By uploading your CRM data to Gong, your Gong users will be able to see their CRM deals in the Gong Deals page, view deal boards to follow up on deal progress, get warnings for deals that are at risk, and see whether their team will reach its quota. The CRM data is also displayed in conversations and calls, so that your Gong users can see account and contact data such as the name and job title of the contact in the call. Account data is displayed in the Accounts page, together with the history of all communication and contact with the company.</p><p><b>Note</b>: Gong provides native integrations with Salesforce, HubSpot and Microsoft Dynamics 365.</p><h2>API Protocol</h2>The API protocol is based on REST guidelines. Check <a href="https://app.gong.io/company/api-authentication?currentTab=MY_API_TAB">here</a> what's your base URL for all API calls.
    <p>The payload is either a JSON object or, for API calls that upload lists of objects, line delimited JSON (see: <a href="https://en.wikipedia.org/wiki/JSON_streaming#Newline-Delimited_JSON">JSON streaming</a>). JSON objects should be UTF-8 encoded.</p><p>Dates and timestamps in JSON objects should be in ISO-8601 format without milliseconds (e.g. '2018-02-18T02:30:00-07:00' or '2018-02-18T08:00:00Z', where Z stands for UTC).</p><h2>What data can I upload?</h2><p>To see your CRM data in Gong, upload the following entities:</p><ul>  <li>Business User: The CRM user, such as a seller or manager. </li>  <li>Account: The customer details in the CRM</li>  <li>Contact: A specific contact in the CRM that is associated with a customer</li>  <li>Deal: A deal or opportunity, or a contract of a specific account in the CRM</li>  <li>Lead: A potential customers who are not associated with an account</li>  <li>Stage: The list of stages the deal can be in, in your CRM</li></ul><h2>Uploading CRM data to Gong</h2><p>This diagram shows how to set up your system in order to upload CRM data to Gong. This is relevant for each scenario of uploading data, initial, incremental and uploading historical data.</p><img alt="" src="/r/img/permanent/crm_api_flow.png" height="95%" ><h3>Registering your Integration</h3><p>Register your integration to get an integrationId used to identify your company's integration with Gong. This is a one time action that does not need to be repeated unless you delete your integration.</p><p>Use <code>PUT v2/crm/integrations</code> to register your integration. The integration Id is returned in the response. Include the integration Id each time you upload your CRM data.</p><h3>Uploading additional data for CRM entities</h3><p>Each CRM entity has a set of standard fields. In addition, you may want to upload additional fields.</p><p>Use the <code>POST /v2/crm/entity-schema</code> to adjust the schema according to your needs. Once you have uploaded your schema to Gong, you can upload your entities with the additional fields.</p><h3>Uploading your CRM data to Gong</h3><p>This section explains how you can use the CRM API to upload your data to Gong:</p><h4>First-time upload</h4><p>Create a database dump of the data you want to upload to Gong based on your CRM schema and data. When uploading your data for the first time you should include all of the CRM records that should appear in Gong.</p><h4>Incremental upload </h4><p>Send regular incremental data updates to Gong. You can update your data as often as you like, we recommend updating between every 1-5 minutes.<br>You should only send new records or records that have changed since the previous upload of data. New records are added to Gong and existing records are updated or deleted, whichever is relevant. Entities are identified by the objectId. Ensure that this ID remains the same each time it is updated.</p><p>When updating data, the modificationDate parameter is mandatory. This enables us to maintain accurate historical data. If your CRM does not store the modification date, send the date the API call is made.</p><h4>Uploading data change history</h4><p>Gong incorporates historical change data in different areas of Gong in order to provide a more accurate picture of the status of different entities at that time. For example, showing the correct stage of a deal at the time a call was made.</p><p>If your CRM stores record history, you are encouraged to load historical change data as part of the integration. You can do this at any time, but we recommend doing this after the initial upload as follows:</p><ol>  <li>Generate the JSON files with the relevant data. Ensure that the modifiedDate is set to the date the entity was updated.</li>  <li>Upload the entities with their historical data using the <code>POST /v2/crm/entities?objectType=ACCOUNT|CONTACT|DEAL|LEAD</code> endpoint.</li></ol><h2>Gong Data Model</h2><p>This diagram shows the connection between the different objects in the CRM API:</p><img alt="" src="/r/img/permanent/crm_api_model.png" height="80%"><p>The following relationship between entities must exist:</p><ul>  <li>A contact must be linked to a single account.</li>  <li>A deal is linked to a single account.</li>  <li>A deal has an owner who is a user in Gong.</li>  <li>A converted lead is expected to be converted into an account and/or a deal and/or a contact.</li></ul><h2>What if my CRM doesn't match the Gong data model?</h2><p>It is possible that your CRM entity model won't match the Gong CRM entity model. Your CRM may store your data in different entities, or you may not have an entity that represents one of the Gong CRM entities.</p><p>In order to upload your CRM data and associate it with calls and conversations, you need to identify the objects in your CRM which match the Gong CRM entities.</p><p>The account is a mandatory entity which must be uploaded in order to integrate Gong with your CRM. To upload account data, identify your CRM entities that contain data about your customers or companies that you do business with. These customers are not actual people within the org, rather they represent the org itself.</p><p>To upload contact details, identify your CRM entities that hold data about employees in the company that your reps are in touch with. A contact represents a person where communication has advanced beyond the prospect stage. Your reps will have multiple conversations and interactions with the contact.</p><p>The deal represents the selling process to the customer (account).</p><p>The lead is a prospect or potential contact, who is not yet associated with an account. If your CRM has an entity which represents people who you contact in the very early stages, and who is later converted to another entity which represents the people you are doing business with (the contact), upload this data as a lead entity.</p><h2>When will my CRM data be displayed in Gong?</h2><p>In addition to the time it takes for data to upload to Gong, the data is first uploaded as raw data and is not automatically available in Gong.</p><br><br><br><br>
- name: Auditing
  description: |
    <h3>Gong’s “Auditing” API endpoints allow you to request the following log types from Gong:</h3>
    <ul>
    <li>
    Access Log - This log is preserved for 14 days only
    </li>
    <li>
    User Activity Log - The data is available since March 2021
    </li>
    <li>
    User Call Play Log - All data is available since inception
    </li>
    <li>
    Externally Shared Call Access Log - All data is available since inception
    </li>
    <li>
    Externally Shared Call Play Log - All data is available since inception
    </li>
    </ul>
- name: Meetings (in Beta Phase)
  description: |
    <h3>Gong’s “Consent Meeting” API endpoints allow you to:</h3>
    <ul>
    <li>
    Request creating a Gong Consent meeting link
    </li>
    <li>
    Update a Consent Meeting’s details
    </li>
    <li>
    Delete a Consent Meeting
    </li>
    <li>
    List all Licensed Users in the Gong instance and their Consent Page status
    </li>
    </ul>
    <h3>The requested calls may contain the following meeting details:</h3>
    <ul>
    <li>
    Meeting Scheduled Start Time
    </li>
    <li>
    Meeting Scheduled End Time
    </li>
    <li>
    Organizer
    </li>
    <li>
    Meeting Title
    </li>
    <li>
    Invitees
    </li>
    <li>
    External Meeting Id - The ID as it is formed on an external system
    </li>
    </ul>
- name: Permissions
  description: |
    <h3>Gong’s "Permission" API endpoints allow you to:</h3>
    <ul>
    <li>
    List all permission profiles in a given workspace
    </li>
    <li>
    Create permission profile
    </li>
    <li>
    Get a permission profile
    </li>
    <li>
    Update permission profile
    </li>
    <li>
    List all users controlled by a permission profile
    </li>
    <li>
    Allow users individual access to calls
    </li>
    <li>
    Remove user's individual access to calls
    </li>
    <li>
    Retrieve users that have individual access to calls
    </li>
    </ul>
- name: Digital Interactions
  description: '<p>Digital interactions (DIs) are events people make when interacting with (mostly) digital content. It can be described as an action someone did on an object. Anything from viewing a document or a video, to registering/completing a course or someone visiting your website. </p><p>The below proposed Digital Interactions API allows mainly tech-partners (and also customers) to capture and track user interactions with various types of digital content. It provides a structured schema for recording a person’s identity, action, content details, and additional contextual information. The API enables seamless integration between tech-partner systems and the Gong platform, providing valuable insights into buyer-seller interactions that sometimes are hidden from a seller’s line-of-sight. </p><p> For simplicity & clarity, the API scheme is designed according to a real-world scenario, including the following terminology:For simplicity & clarity, the API scheme is designed according to a real-world scenario, including the following terminology:</p><ul>  <li>Event: Represents something that happened, described as an action verb + content engaged (e.g., "signed a contract").</li>  <li>Content: Refers to the specific content engaged during the event (e.g., contract). Provides details such as label, title, ID, and URLs.</li>  <li>Person: Represents the individual responsible for the action. Can be a known person or an anonymous user associated with a company.</li>  <li>Content Custom Fields: Custom properties for the content. Example: Custom field - "Version: 2.0", Custom field - "Author: Jane Smith".</li>  <li>Company: Refers to the organization associated with the person. Example: Company ID - "7890", Company name - "XYZ Corp".</li>  <li>Partner: An external collaborating organization that owns a software product involved in the digital interactions captured by the API.</li></ul>'
- name: Integration Settings
  description: "<p>Configure your integration settings for displaying your company data in iFrames. For example, use this API to configure dynamic links as the iFrame source. This endpoint includes validation mechanisms to ensure the integration is secure.</p><p>Mandatory fields are marked with a *.</p>"
- name: Engagement (Legacy – See “Digital Interactions”)
  description: |
    <h3>Limited release - contact <a href="mailto:integration.requests@gong.io">integration.requests@gong.io</a> for more information.
    </h3>

    <h3>Gong’s "Engagement" API endpoints allow you to push engagement events into Gong and display them as events in Gong’s activity timeline.</h3>
    <h3>There are currently 3 types of events:</h3>
    <ul>
    <li>
    "Content Shared" Event Type - Use this event type to push engagement events into Gong when a Gong user shares content with external participants (for example, a contract was “shared” by the account executive with his prospects)</li>
    <li>
    "Content Viewed" Event Type - Use this event type to push engagement events into Gong when a content is viewed by an external participant (for example, a contract was “viewed” by the prospect)
    </li>
    <li>
    "Custom Action" Event Type -  Use this event type to push engagement events into Gong when a content is engaged by an external participant (for example, a contract was “signed” by the prospect)</li>
    </ul>
paths:
  "/v2/calls":
    get:
      tags:
      - Calls
      summary: Retrieve call data by date range (/v2/calls)
      description: |-
        List calls that took place during a specified date range.

        When accessed through a Bearer token authorization method, this endpoint requires the scope 'api:calls:read:basic'.
      operationId: Calls_listCalls
      parameters:
      - name: cursor
        in: query
        description: When paging is needed, provide the value supplied by the previous API call to bring the following page of records.
        required: false
        style: form
        explode: true
        schema:
          type: string
        example: eyJhbGciOiJIUzI1NiJ9.eyJjYWxsSWQiM1M30.6qKwpOcvnuweTZmFRzYdtjs_YwJphJU4QIwWFM
      - name: fromDateTime
        in: query
        description: 'Date and time (in ISO-8601 format: ''2018-02-18T02:30:00-07:00'' or ''2018-02-18T08:00:00Z'', where Z stands for UTC) from which to list recorded calls. Returns calls that started on or after the specified date and time. If not provided, list starts with earliest call. For web-conference calls recorded by Gong, the date denotes its scheduled time, otherwise, it denotes its actual start time.'
        required: true
        style: form
        explode: true
        schema:
          type: string
      - name: toDateTime
        in: query
        description: 'Date and time (in ISO-8601 format: ''2018-02-18T02:30:00-07:00'' or ''2018-02-18T08:00:00Z'', where Z stands for UTC) until which to list recorded calls. Returns calls that started up to but excluding specified date and time. If not provided, list ends with most recent call. For web-conference calls recorded by Gong, the date denotes its scheduled time, otherwise, it denotes its actual start time.'
        required: true
        style: form
        explode: true
        schema:
          type: string
      - name: workspaceId
        in: query
        description: Optional Workspace identifier, if supplied the API will return only the calls belonging to this workspace.
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CallsResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: No calls found for the specified period
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
    post:
      tags:
      - Calls
      summary: Add new call (/v2/calls)
      description: |-
        When using this endpoint, either provide a downloadMediaUrl or use the returned callId in a follow-up request to /v2/calls/{id}/media to upload the media file.

        When accessed through a Bearer token authorization method, this endpoint requires the scope 'api:calls:create'.
      operationId: Calls_addCall
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/NewCallAddingRequest"
        required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/NewCallAddingResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '409':
          description: Conflict, e.g. recording is not enabled for the primary user
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
  "/v2/calls/{id}/media":
    put:
      tags:
      - Calls
      summary: Add call media (/v2/calls/{id}/media)
      description: |-
        Adds a call media, recorded by a telephony system (PBX) or other media recording facility. Gong accepts call recordings in various audio and video file formats, including WAV, MP3, MP4, MKV and FLAC. If uploading a dual-channel (stereo) file separated by speaker, make sure to specify which channel correspondsto the company team member (rep) in the parties/mediaChannelId parameter of the Add New Call operation.

        When accessed through a Bearer token authorization method, this endpoint requires the scope 'api:calls:create'.
