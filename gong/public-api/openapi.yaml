  "/v2/data-privacy/erase-data-for-phone-number":
    post:
      tags:
      - Data Privacy
      summary: Delete the phone number, and all associated elements (/v2/data-privacy/erase-data-for-phone-number)
      description: |-
        Given a phone number, this endpoint deletes from the Gong system any leads or contacts with a matching phone number or mobile phone number. Email messages sent to or from these leads/contacts are deleted. Calls where the leads/contacts appear are deleted. The deletion is not immediate, and may take several hours to complete.

        This endpoint contains a data integrity protection mechanism to prevent the deletion of an abnormal number of objects. If the deletion fails please contact support at help@gong.io

        Delete the data from your CRM and email system before performing this operation so that private data is not re-imported into Gong.

        When accessed through a Bearer token authorization method, this endpoint requires the scope 'api:data-privacy:delete'.
      operationId: DataPrivacy_purgePhoneNumber
      parameters:
      - name: phoneNumber
        in: query
        description: |-
          The phone number.

          This number must start with a + (plus) sign followed by the country code, area code, and local phone number. All other non-digits are ignored.

          The following are examples of permitted phone numbers: +1 425 555 2671, +1-425-555-2671, +1 425 5552671, +14255552671, +1 425 555 26 71, +1(425) 555-2671, etc.

          Note: This parameter should be URL-encoded.
        required: true
        style: form
        explode: true
        schema:
          type: string
        example: "+1(425) 555-2671"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/BaseResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
  "/v2/data-privacy/erase-data-for-email-address":
    post:
      tags:
      - Data Privacy
      summary: Delete the email address, and all associated elements (/v2/data-privacy/erase-data-for-email-address)
      description: |-
        Given an email address, this endpoint deletes from the Gong system any calls or email messages that reference this address. Email messages sent to or from the address are deleted. Calls where the email address appears (as a lead, contact, attendee or speaker) are deleted. Leads or Contacts with the email address are deleted. The deletion is not immediate, and may take several hours to complete.

        This endpoint contains a data integrity protection mechanism to prevent the deletion of an abnormal number of objects. If the deletion fails please contact support at help@gong.io

        Delete the data from your CRM and email system before performing this operation so that private data is not re-imported into Gong.

        When accessed through a Bearer token authorization method, this endpoint requires the scope 'api:data-privacy:delete'.
      operationId: DataPrivacy_purgeEmailAddress
      parameters:
      - name: emailAddress
        in: query
        description: The email address.
        required: true
        style: form
        explode: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/BaseResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
  "/v2/crm/entity-schema":
    get:
      tags:
      - CRM
      summary: List Schema Fields (/v2/crm/entity-schema)
      description: '<style>.public-api-info {    background: rgb(222, 235, 255);}.public-api-tip {    background: rgb(227, 252, 239);}.public-api-parameter {    background: rgba(9,30,66,0.08);}.public-api-note {    background: rgb(234, 230, 255);}.public-api-important {    background: rgb(255, 250, 230);}.public-api-critical {    background: rgb(255, 235, 230);}table, th, td {  border: 1px solid gray;  border-collapse: collapse;}th, td {  padding: 5px;}th {  text-align: left;}img {  border: 2px solid #D3D5D9;}</style><p>Retrieves a list of the object schema fields.</p><p>When accessed using a bearer token, this endpoint requires the scope ''api:crm:schema''.</p><h3>Example</h3><h4>Request</h4><code>GET https://api.gong.io/v2/crm/entity-schema?integrationId=6286478263646&objectType=ACCOUNT</code><h4>Response</h4><code>{    "requestId": "afjkzqkqglog7ueki5",    "objectTypeToSelectedFields": {        "ACCOUNT": [            {                "name": "accountTypePicklist",                "label": "Account Type",                "type": "PICKLIST",                "lastModified": null,                "isDeleted": false,                "referenceTo": null,                "orderedValueList": null            },            {                "name": "accountTypePicklist2",                "label": "Account Type2",                "type": "PICKLIST",                "lastModified": null,                "isDeleted": false,                "referenceTo": null,                "orderedValueList": null            },            {                "name": "fooBar",                "label": "Foo Bar",                "type": "STRING",                "lastModified": null,                "isDeleted": false,                "referenceTo": null,                "orderedValueList": null            }        ]    }}</code>'
      operationId: CRM_listCrmSchemaFields
      parameters:
      - name: integrationId
        in: query
        description: Integration ID generated when creating the integration
        required: true
        style: form
        explode: true
        schema:
          type: integer
          format: int64
      - name: objectType
        in: query
        description: Type of object to retrieve the schema fields for (case-sensitive). <br>Omitting this parameter returns the schema for all object types.
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - ACCOUNT
          - CONTACT
          - DEAL
          - LEAD
      responses:
        '200':
          description: Successfully retrieved crm schema fields
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListSelectedFieldsResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
    post:
      tags:
      - CRM
      summary: Upload Object Schema (/v2/crm/entity-schema)
      description: '<style>.public-api-info {    background: rgb(222, 235, 255);}.public-api-tip {    background: rgb(227, 252, 239);}.public-api-parameter {    background: rgba(9,30,66,0.08);}.public-api-note {    background: rgb(234, 230, 255);}.public-api-important {    background: rgb(255, 250, 230);}.public-api-critical {    background: rgb(255, 235, 230);}table, th, td {  border: 1px solid gray;  border-collapse: collapse;}th, td {  padding: 5px;}th {  text-align: left;}img {  border: 2px solid #D3D5D9;}</style><p>Enables you to add, edit or remove fields to Gong CRM entities, so that you can display additional CRM data in Gong. Fields that are not included in the Gong CRM objects, and are uploaded without updating your schema, are not displayed in Gong.</p><p>Update your schema when:</p><ul>  <li>You create a new integration</li>  <li>There are changes to the schema of any object type. You can also send a schema update request before any request to the <code>/v2/crm/entities</code> API.</li></ul><p>When updating your schema:</p><ul>  <li>Add or change field: include all fields you want in the schema, including those sent previously. Example:     <table>      <tr>        <th>Date</th>        <th>Action</th>        <th>Result</th>      </tr>      <tr>        <td>3/4/2023</td>        <td>Send account schema with fieldA</td>        <td>fieldA added to the account</td>      </tr>      <tr>        <td>6/4/23</td>        <td>Send account schema with fieldA and fieldB</td>        <td>fieldA still included in account schema. fieldB added to the account</td>      </tr>      <tr>        <td>8/4/23</td>        <td>Send account schema with fieldC but without fieldA and fieldB</td>        <td>Receive an error that you must include all fields in the schema</td>      </tr>      <tr>        <td>15/4/23</td>        <td>Send account schema with fieldB, fieldC, and isDeleted for fieldA</td>        <td>fieldA and all it''s data are deleted. fieldB and fieldC remain in the schema</td>      </tr>    </table>  </li>  <li>Changing a field: if you change the field type, a new field is created and the data associated with the original field is deleted. Other changes, such as the label do not result in data being deleted.</li>  <li>Deleting a field: to delete a field and it''s associated data, send the field with isDeleted = true</li></ul><p>When accessed using a bearer token, this endpoint requires the ''api:crm:schema'' scope.</p><h2>Supported field types</h2><p>This table describes the field types that can be added to your schema</p><table>  <tr><th>Field type</th><th>Format in JSON</th><th>Possible values</th></tr>  <tr><td>BOOLEAN</td><td>boolean</td><td>true, false</td></tr>  <tr><td>DATE</td><td>string (ISO-8601 date without time)</td><td>"2020-05-31"</td></tr>  <tr><td>DATETIME</td><td>string (ISO-8601 datetime without milliseconds)</td><td>"2020-12-17T07:37:21+02:00"<p>"2020-12-17T05:37:21Z"</p></td></tr>  <tr><td>PICKLIST</td><td>string - one of the values in an orderedValueList</td><td>"Analyst"</td></tr>  <tr><td>NUMBER</td><td>number</td><td>45.66, 8453</td></tr>  <tr><td>PERCENT</td><td>number (between 0 to 100)</td><td>67.3</td></tr>  <tr><td>CURRENCY*</td><td>number</td><td>34.68</td></tr>  <tr><td>PHONENUMBER</td><td>string</td><td>"+14055766687"</td></tr>  <tr><td>EMAILADDRESS</td><td>string</td><td>"john.doe@anywhere.com"</td></tr>  <tr><td>REFERENCE</td><td>string - the id of another object</td><td>"48b009drax"</td></tr>  <tr><td>ID</td><td>string - the id of the object</td><td>"843hf8484jr84htg"</td></tr>  <tr><td>STRING</td><td>string</td><td>"whatever you want"</td></tr>  <tr><td>URL</td><td>string</td><td>"https://crm.com/account/6d4r578f"</td></tr></table><p>* In the integration send a number value, and specify the correct currency symbol in the Gong UI. Currently Gong does not support multiple currencies per company.</p><h3>Example</h3><h4>Request</h4><p><code>POST https://api.gong.io/v2/crm/entity-schema?integrationId=6286478263646&objectType=ACCOUNT</code></p><p><code>[{"uniqueName": "orderId", "label": "ID", "type": "ID", "lastModified": "2020-11-11T08:11:34+01:00"},</code></p><p><code>{"uniqueName": "parentAccount", "label": "Main Account", "type": "REFERENCE", "referenceTo": "ACCOUNT", "lastModified": "2020-11-11T08:11:34+01:00"},</code></p><p><code>{"uniqueName": "category", "label": "Category", "type": "PICKLIST", "orderedValueList": ["Analyst", "Competitor", "Customer", "Integrator", "Investor", "Partner", "Other"], "lastModified": "2020-11-11T08:11:34+01:00"}, </code></p><p>// remove custom field</p><p><code>{"uniqueName": "industry", "isDeleted": true, "label": "Industry", "type": "PICKLIST", "lastModified": "2020-11-21T08:11:34+01:00"}] </code></p>'
      operationId: CRM_uploadCrmSchemaField
      parameters:
      - name: integrationId
        in: query
        description: Integration ID generated when creating the integration
        required: true
        style: form
        explode: true
        schema:
          type: integer
          format: int64
      - name: objectType
        in: query
        description: The object type to set the schema for (case-sensitive)
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - ACCOUNT
          - CONTACT
          - DEAL
          - LEAD
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                "$ref": "#/components/schemas/GenericSchemaFieldRequest"
        required: true
      responses:
        '201':
          description: Successfully uploaded crm schema fields
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SchemaUpdateResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/BaseResponse"
  "/v2/crm/entities":
    get:
      tags:
      - CRM
      summary: Get CRM objects (/v2/crm/entities)
      description: '<style>.public-api-info {    background: rgb(222, 235, 255);}.public-api-tip {    background: rgb(227, 252, 239);}.public-api-parameter {    background: rgba(9,30,66,0.08);}.public-api-note {    background: rgb(234, 230, 255);}.public-api-important {    background: rgb(255, 250, 230);}.public-api-critical {    background: rgb(255, 235, 230);}table, th, td {  border: 1px solid gray;  border-collapse: collapse;}th, td {  padding: 5px;}th {  text-align: left;}img {  border: 2px solid #D3D5D9;}</style><h2>This API is for use in the <strong>development phase only</strong>, to manually verify that objects are uploaded and processed correctly in Gong.</h2><p>Returns a JSON object where each key is the object’s crm id and the corresponding value is a nested JSON object representing the CRM object fields. Each key in the nested JSON is the field name and the corresponding value is the field value.</p><p>The objects are fetched from the Gong main DB. If the object is not found, the JSON’s value is null.</p><p>The request body contains an array of objects ids.</p><p>The request is limited to 100 objects. If more than 100 objects are requested only the first 100 are returned.</p><p>When accessed using a bearer token, this endpoint requires the ''api:crm:get-objects'' scope.</p><h3>Example</h3><h4>Request</h4><code>GET https://api.gong.io/v2/crm/entities?integrationId=6286478263646&objectType=DEAL</code><br><br><code>["1234","8765"] //request body</code>'
      operationId: CRM_getCrmObjects
      parameters:
      - name: integrationId
        in: query
        description: Integration ID generated when creating the integration
        required: true
        style: form
        explode: true
        schema:
          type: integer
          format: int64
      - name: objectType
        in: query
        description: Requested objects type
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - ACCOUNT
          - CONTACT
          - DEAL
          - LEAD
      - name: objectsCrmIds
        in: query
        description: "<b>Request Body:</b> The requested objects crm ids (should be sent in the request body)"
        required: true
        style: form
        explode: true
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
      responses:
        '200':
          description: Successfully retrieved requested objects data
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetGenericCrmObjectsResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
    post:
      tags:
      - CRM
      summary: Upload CRM objects (/v2/crm/entities)
      description: "<style>.public-api-info {    background: rgb(222, 235, 255);}.public-api-tip {    background: rgb(227, 252, 239);}.public-api-parameter {    background: rgba(9,30,66,0.08);}.public-api-note {    background: rgb(234, 230, 255);}.public-api-important {    background: rgb(255, 250, 230);}.public-api-critical {    background: rgb(255, 235, 230);}table, th, td {  border: 1px solid gray;  border-collapse: collapse;}th, td {  padding: 5px;}th {  text-align: left;}img {  border: 2px solid #D3D5D9;}</style><p>Inserts, updates, or deletes a CRM entity in Gong.</p><p>Gong searches for existing entities with the same ID, to determine whether the entity should be added or updated.</p><p>Ensure you have an authentication key and that you have registered your integration before uploading your CRM data.</p><p>When accessed using a bearer token, this endpoint requires the 'api:crm:upload' scope.</p><h2>Request parameters</h2> <h3>Query String parameters</h3><p>Mandatory parameters are marked with a <font color=\"red\">*</font>.</p><table>  <tr>    <th>Name</th>    <th>Description</th>    <th>Data Type</th>  </tr>  <tr>    <td>integrationId <font color=\"red\">*</font></td>    <td>Integration ID generated when creating the integration</td>    <td>long</td>  </tr>  <tr>    <td>objectType <font color=\"red\">*</font></td>    <td>The object being uploaded. Options are (case-sensitive): <br><ul><li>ACCOUNT</li><li>CONTACT</li><li>DEAL</li><li>LEAD</li><li>BUSINESS_USER</li><li>STAGE</li></ul> </td>    <td>string</td>  </tr>  <tr>    <td>clientRequestId\t<font color=\"red\">*</font></td>    <td>A unique identifier sent by you to allow troubleshooting and to prevent repeated attempts to upload the same list of objects.<br>Valid characters: letters, numbers, dashes and underscores.</td>    <td>string</td>  </tr></table><h2>Request Body</h2><ul>  <li>Content-Type should be multipart/form-data</li>  <li>Maximum payload size: 200 megabytes</li></ul><table>  <tr>    <th>Name</th>    <th>Description</th>    <th>Data Type</th>  </tr>  <tr>    <td>dataFile <font color=\"red\">*</font></td>    <td>The LDJSON file with the entity data to upload. A file should only contain objects of one entity type. Records that have multiple updates should be sent in separate files. Each JSON object should be on a separate line. </td>    <td>file</td>  </tr></table><h2>CRM Entities</h2><p>This section details the entities that can be uploaded to Gong </p><h3>Business User</h3><p>The CRM business user represents the Gong user in the CRM and is responsible for the relationship with the account and for creating opportunities and closing deals. Uploading business users enables Gong to associate CRM entities such as accounts and contacts with the relevant user in Gong and with their Gong activity, such as conversations. </p><p>Mandatory parameters are marked with a <font color=\"red\">*</font>.</p><p>To upload your business users to Gong, generate a JSON file with the following fields:</p><table>  <tr>    <th>Name</th>    <th>Description</th>    <th>Data Type</th>  </tr>  <tr>    <td>objectId <font color=\"red\">*</font></td>    <td>The CRM unique ID for the object. <br>Note: objectId can have a maximum of 64 characters and can have the following characters:       <ul>        <li>alpha numeric characters and a \"-\" </li>        <li>a valid email address</li>      </ul>No other special characters can be used    </td>    <td>string</td>  </tr>  <tr>    <td>modifiedDate <font color=\"red\">*</font></td>    <td>The date and time the object was last modified in the CRM</td>    <td>ISO-8601 datetime format, without milliseconds</td>  </tr>  <tr>    <td>isDeleted</td>    <td>(Default: false) When true, the object is deleted from the database.</td>    <td>boolean</td>  </tr>  <tr>    <td>url</td>    <td>The full URL path to view this object in the CRM</td>    <td>string (Qualified URI)</td>  </tr>  <tr>    <td>emailAddress <font color=\"red\">*</font></td>    <td>The business user's email address. Used to associate the Gong user with the CRM user. Not mandatory when isDeleted = true.</td>    <td>string</td>  </tr></table><h4>Associating the Gong user with the CRM user</h4><p>The CRM user is associated with the Gong user according to the email address. Each CRM deal contains an ownerId field, which is the CRM user ID.</p><p>To update an existing user:</p><ol>  <li>Delete the existing user by uploading the business user entity with isDeleted=true.</li>  <li>In a new request, send the new user details with isDeleted=false, or send a different user with the same email address.</li></ol><h3>Account</h3><p>The account object is an active customer in the CRM. Emails and calls in Gong are associated with this account object.</p><p>Mandatory parameters are marked with a <font color=\"red\">*</font>.</p><p>To upload your CRM accounts to Gong, generate a JSON file with the following fields:</p><table>  <tr>    <th>Name</th>    <th>Description</th>    <th>Data Type</th>  </tr>  <tr>    <td>objectId <font color=\"red\">*</font></td>    <td>The CRM unique ID for the object.<br>Note: objectId can have a maximum of 64 characters and can have the following characters:       <ul>        <li>alpha numeric characters and a \"-\" </li>        <li>a valid email address</li>      </ul>No other special characters can be used    </td>    <td>string</td>  </tr>  <tr>    <td>modifiedDate <font color=\"red\">*</font></td>    <td>The date and time the object was last modified in the CRM</td>    <td>ISO-8601 datetime format, without milliseconds</td>  </tr>  <tr>    <td>isDeleted</td>    <td>(Default: false) When true, the object is deleted from the database</td>    <td>boolean</td>  </tr>  <tr>    <td>url</td>    <td>A full http URL to browse this object in the CRM</td>    <td>string (Qualified URI)</td>  </tr>  <tr>    <td>name</td>    <td>The account name. <br>Default value: \"Account_#\"+objectId</td>    <td>string</td>  </tr>  <tr>    <td>domains</td>    <td>The account's domain/s. When an activity can’t be associated with a contact, the participants domain is used to associate the activity to an account via the account domain in this field.</td>    <td>string array</td>  </tr></table><h3>Contact</h3><p>A contact in Gong is the contact associated with the account. Gong uses a contact to match an activity to the correct account.</p> <p>Mandatory parameters are marked with a <font color=\"red\">*</font>.</p><p>To upload your CRM contacts to Gong, generate a JSON file with the following fields:</p><table><tr><th>Name</th><th>Description</th><th>Data Type</th></tr><tr><td>objectId <font color=\"red\">*</font></td><td>The CRM unique ID for the object.<br>Note: objectId can have a maximum of 64 characters and can have the following characters: <ul><li>alpha numeric characters and a \"-\" </li><li>a valid email address</li></ul>No other special characters can be used</td><td>string</td></tr><tr><td>modifiedDate <font color=\"red\">*</font></td><td>The date and time the object was last modified in the CRM</td><td>ISO-8601 datetime format, without milliseconds</td></tr><tr><td>isDeleted</td><td>(Default: false) When true, the object is deleted from the database.</td><td>boolean</td></tr><tr><td>url</td><td>A full http URL to browse this object in the CRM</td><td>string (Qualified URI)</td></tr><tr><td>accountId</td><td>The ID of the account associated with the contact in the CRM. Used to associate an activity to an account once the activity has been associated with a contact.</td><td>string</td></tr><tr><td>emailAddress</td><td>The contact's email address. Used to associate activities to a contact, based on the participants email. </td><td>string</td></tr><tr><td>firstName</td><td>The contact's first name</td><td>string</td></tr><tr><td>lastName</td><td>The contact's last name</td><td>string</td></tr><tr><td>title</td><td>The contact's title</td><td>string</td></tr><tr><td>phoneNumber</td><td>The contact's phone number. Used to associate telephony system calls to a contact based on the call participant's phone number.</td><td>string</td></tr></table><h3>Deal</h3><p>A deal in Gong is a qualified opportunity or contract in a specific account.</p> <p>Mandatory parameters are marked with a <font color=\"red\">*</font>.</p><p>To upload your deals to Gong, generate a JSON file with the following fields:</p><table><tr><th>Name</th><th>Description</th><th>Data Type</th></tr><tr><td>objectId <font color=\"red\">*</font></td><td>The CRM unique ID for the object.<br>Note: objectId can have a maximum of 64 characters and can have the following characters: <ul><li>alpha numeric characters and a \"-\" </li><li>a valid email address</li></ul>No other special characters can be used</td><td>string</td></tr><tr><td>modifiedDate <font color=\"red\">*</font></td><td>The date and time the object was last modified in the CRM</td><td>ISO-8601 datetime format, without milliseconds</td></tr><tr><td>isDeleted</td><td>(Default: false) When true, the object is deleted from the database.</td><td>boolean</td></tr><tr><td>url</td><td>A full http URL to access this object in the CRM</td><td>string (Qualified URI)</td></tr><tr><td>accountId</td><td>The ID of the account the deal is associated with in the CRM. <br><b>Note</b>: Deals without an accountId will not appear in Gong</td><td>string</td></tr><tr><td>ownerId</td><td>The ID of the deal owner in the CRM. This ID should be the same as the business user objectId so the deal can be associated with the correct Gong user. <br><b>Note</b>: Deals without an ownerId will not appear in the deal board in Gong. </td><td>string</td></tr><tr><td>name</td><td>The deal name<br>Default value: Deal_# + objectId</td><td>string</td></tr><tr><td>createdDate</td><td>The date and time the deal was created in the CRM.</td><td>ISO-8601 datetime without milliseconds</td></tr><tr><td>closeDate</td><td>The date the deal closed or is expected to close. <br><b>Note</b>: Deals without a closeDate will not appear in the deal board in Gong.</td><td>string</td></tr><tr><td>status</td><td>The deal status. Possible values are: <ul><li>WON</li><li>LOST</li><li>OPEN</li></ul><br>Default value: OPEN</td><td>string</td></tr><tr><td>stage</td><td>The stage the deal is in. If empty, it will not always be possible to associate activities with deals. <br>Must be the same as one of the values in the objectId field in the stages object</td><td>string</td></tr><tr><td>amount</td><td>The deal amount in the currency unit. Companies set their default currency in the Company Settings page. All amounts should be sent in this currency. If your deal is in a different currency, convert the deal amount to the currency defined in the Company Settings page.<br>Default value: 0</td><td>currency</td></tr></table><h3>Lead</h3><p>A Lead is a potential customer, who may not yet be associated with an account. If conversations can't be associated with a contact, Gong then checks to see whether there is a relevant lead to associate with the conversation.</p> <p>Mandatory parameters are marked with a <font color=\"red\">*</font>.</p><p>To upload your leads to Gong, generate a JSON file with the following fields:</p><table><tr><th>Name</th><th>Description</th><th>Data Type</th></tr><tr><td>objectId <font color=\"red\">*</font></td><td>The CRM unique ID for the object.<br>Note: objectId can have a maximum of 64 characters and can have the following characters: <ul><li>alpha numeric characters and a \"-\" </li><li>a valid email address</li></ul>No other special characters can be used</td><td>string</td></tr><tr><td>modifiedDate <font color=\"red\">*</font></td><td>The date and time the object was last modified in the CRM</td><td>ISO-8601 datetime format, without milliseconds</td></tr><tr><td>isDeleted</td><td>(Default: false) When true, the object is deleted from the database.</td><td>boolean</td></tr><tr><td>url</td><td>A full http URL to browse this object in the CRM</td><td>string (Qualified URI)</td></tr><tr><td>emailAddress </td><td>The lead's email address. Used to associate activities to a lead, based on the participants email. </td><td>string</td></tr><tr><td>firstName </td><td>The lead's first name</td><td>string</td></tr><tr><td>lastName </td><td>The lead's last name</td><td>string</td></tr><tr><td>title</td><td>The lead's title</td><td>string</td></tr><tr><td>phoneNumber</td><td><p>The lead's phone number. Used to associated telephony system calls to a lead based on the call participant's phone number. </p><p></td><td>string</td></tr><tr><td>convertedToDealId</td><td>The deal ID in the CRM. Relevant if the lead is converted to a deal</td><td>string</td></tr><tr><td>convertedToContactId</td><td>The contact ID in the CRM the lead was converted to. Relevant if the lead is converted to a contact</td><td>string</td></tr><tr><td>convertedToAccountId</td><td>The account ID in the CRM the lead was converted to. Relevant if the lead is converted to an account</td><td>string</td></tr></table><h3>Stage</h3><p>The list of stages the deal can be in, in the CRM.  Stages are set to be active or inactive so that if you want to delete them, the stage is still associated with existing deals in that stage but will not be available for new deals. </p> <p>Mandatory parameters are marked with a <font color=\"red\">*</font>.</p><p>To upload your stages to Gong, generate a JSON file with the following fields:</p><table><tr><th>Name</th><th>Description</th><th>Data Type</th></tr><tr><td>objectId <font color=\"red\">*</font></td><td>The CRM unique ID for the object. <br>Note: objectId can have a maximum of 64 characters and can have the following characters: <ul><li>alpha numeric characters and a \"-\" </li><li>a valid email address</li></ul>No other special characters can be used</td><td>string</td></tr><tr><td>name <font color=\"red\">*</font></td><td>The display name for the stage</td><td>string</td></tr><tr><td>isActive</td><td>When true, sets the stage to active in Gong. When false, sets the stage to inactive in Gong.<br>Default value: true</td><td>boolean</td></tr><tr><td>sortOrder</td><td>The order of the stage in the sales process (starting from 1). The stages are displayed according to this order. If two stages have the same sort order they will be displayed one after another. <br>Default value: 1</td><td>integer</td></tr></table><h2>Example</h2><h3>Upload Business User account</h3><code>POST https://api.gong.io/v2/crm/entities?clientRequestId=1234&integrationId=6286478263646&objectType=BUSINESS_USER<br>{\"objectId\": \"user1_Id_In_The_CRM\", \"emailAddress\": \"john.doe@acme.com\", \"modifiedDate\": \"2019-01-03T23:45:57+01:00\"}<br> // remove user mapping for user user2_Id_In_The_CRM<br>{\"objectId\": \"user2_Id_In_The_CRM\", \"isDeleted\": true, \"emailAddress\": \"john.taylor@acme.com\", \"modifiedDate\": \"2019-01-03T23:45:57+01:00\"}</code><h3>Upload Stage example</h3><code>POST https://api.gong.io/v2/crm/entities?clientRequestId=1234&integrationId=6286478263646&objectType=STAGE<br>{\"objectId\": \"discovery\", \"name\": \"Discovery\", \"isActive\": true, \"sortOrder\": 1}<br>{\"objectId\": \"won\", \"modifiedDate\": \"2019-01-03T23:45:57+01:00\", \"name\": \"Closed Won\", \"isActive\": true, \"sortOrder\": 5}</code><h3>Upload Account example</h3><p><code>POST https://api.gong.io/v2/crm/entities?clientRequestId=1234&integrationId=6286478263646&objectType=ACCOUNT<br>// account with additional field<br>{\"objectId\": \"5ybyh6n6n65\", \"modifiedDate\": \"2019-01-03T23:45:57+01:00\", \"url\": \"https://crm.com/accounts/5ybyh6n6n65\", \"name\": \"PBR\", \"domains\": [\"pbr.com\", \"pbr.gov\"], \"type\": \"Investor\"}<br>// remove account gfjhty756th from Gong <br>{\"objectId\": \"gfjhty756th\", \"modifiedDate\": \"2019-01-03T22:45:57Z\", \"name\": \"PBR\", \"domains\": [\"pbr.com\", \"pbr.gov\"], \"isDeleted\": true} </code><h3>Upload Contact example</h3><code>POST https://api.gong.io/v2/crm/entities?clientRequestId=1234&integrationId=6286478263646&objectType=CONTACT<br>{\"objectId\": \"5zbwd7n5n65\", \"modifiedDate\": \"2019-01-03T23:45:57+01:00\", \"url\": \"https://crm.com/contacts/5zbwd7n5n65\", \"accountId\": \"5ybyh6n6n65\", \"emailAddress\": \"john.smith@acme.com\", \"firstName\": \"john\", \"lastName\": \"smith\", \"phoneNumber\": \"(912) 507-4395\"}</code><h3>Upload Lead example</h3><code>POST https://api.gong.io/v2/crm/entities?clientRequestId=1234&integrationId=6286478263646&objectType=LEAD<br>{\"objectId\": \"4v5bt54t553\", \"modifiedDate\": \"2019-01-03T23:45:57+01:00\", \"url\": \"https://crm.com/leads/45k4j5j5k44\", \"emailAddress\": \"jane.doe@acme.com\", \"firstName\": \"Jane\", \"lastName\": \"Doe\", \"title\": \"VP Special Effects\", \"phoneNumber\": \"(912) 507-4395\"}<br>// remove lead gf4543gf6th<br>{\"objectId\": \"gf4543gf6th\", \"modifiedDate\": \"2019-01-03T22:45:57Z\", \"emailAddress\": \"john.smith@acme.com\", \"firstName\": \"John\", \"lastName\": \"Smith\", \"isDeleted\": true} <br>// lead 63473hjg53h converted to account 6sjk47jf78d, contact 87grhn74hg6 and deal dkfj8dfgf87<br>{\"objectId\": \"63473hjg53h\", \"modifiedDate\": \"2019-01-03T23:45:57+01:00\", \"emailAddress\": \"bob.smith@acme.com\", \"firstName\": \"Bob\", \"lastName\": \"Smith\", \"convertedToDealId\": \"dkfj8dfgf87\", \"convertedToContactId\": \"87grhn74hg6\", \"convertedToAccountId\": \"6sjk47jf78d\"} </code><h3>Upload Deal example</h3><code>POST https://api.gong.io/v2/crm/entities?clientRequestId=1234&integrationId=6286478263646&objectType=DEAL<br>{\"objectId\": \"8608553\", \"modifiedDate\": \"2022-02-04T18:24:59Z\", \"url\": \"http://crm.com/deals/8608553\", \"accountId\": \"5ybyh6n6n65\", \"ownerId\": \"5486951\", \"name\": \"Deal name\", \"createdDate\": \"2022-02-04T17:57:23Z\", \"closeDate\": \"2022-09-04\", \"status\": OPEN, \"stage\": \"discovery\", \"amount\": 7000, \"custom_field_1\": \"2022-02-04T17:57:23.000Z\", \"custom_field_2\": null}</code><h3>Uploading additional fields</h3><p>If you defined additional fields using the <code>/v2/crm/entity-schema</code> API, include those fields in the JSON file.</p>"
      operationId: CRM_uploadCrmData
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - dataFile
              type: object
              properties:
                dataFile:
                  type: string
                  description: The CRM data file. You may attach files up to 200MB in size
                  format: binary
        required: true
      responses:
        '201':
          description: 'Successfully uploaded the crm data.<br>Important: This API is asynchronous. A 201 response indicates that the file successfully uploaded to Gong and is pending processing. Use the clientRequestId to verify the status of the request by calling the GET /v2/crm/request-status endpoint.'
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AsyncProcessingResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '409':
          description: Client request id has already been used
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
