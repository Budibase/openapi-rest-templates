  "/v2/entities/get-brief":
    get:
      tags:
      - Entities (Beta)
      summary: Generate a brief for a CRM entity (/v2/entities/get-brief)
      description: "Get a brief for an account, deal, contact, or lead that exists in your CRM. Briefs are set up in the Gong Agent Studio and you must provide the name of the brief you want to generate. A call to this API consumes Gong credits according to the number of emails and calls used to generate the brief. \nThe brief is generated from calls or emails associated with the entity within the specified time period.\nThe response includes:\n\n<ul><li>The brief </li>\n\n<li>Details of emails and calls used to generate the brief</li></ul>\nRequired authorization scope: 'api:ai-briefer:read'. Get AI-generated briefs for entities (Accounts, Deals, Contacts, Leads) using briefs configured in Gong."
      operationId: EntitiesBeta_generateBrief
      parameters:
      - name: workspaceId
        in: query
        description: Workspace identifier. The workspace the brief is defined in.
        required: true
        style: form
        explode: true
        schema:
          type: integer
          format: int64
        example: 1237998047883638784
      - name: briefName
        in: query
        description: The name of the brief to generate. Briefs are configured in the Agent Studio > AI Briefer.
        required: true
        style: form
        explode: true
        schema:
          type: string
        example: Account overview
      - name: crmEntityType
        in: query
        description: The object type of the entity in the CRM.
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - ACCOUNT
          - CONTACT
          - DEAL
          - LEAD
        example: ACCOUNT
      - name: crmEntityId
        in: query
        description: The CRM Id of the entity the question is asked about.
        required: true
        style: form
        explode: true
        schema:
          type: string
        example: 125260001VdfoWBAR
      - name: timePeriod
        in: query
        description: Specifies the time period during which associated calls and emails must have occurred to be used to generate the answer. The calls and emails must be associated with the specified entity.
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - LAST_7DAYS
          - LAST_30DAYS
          - LAST_90DAYS
          - LAST_90_DAYS_SINCE_LAST_ACTIVITY
          - LAST_YEAR_SINCE_LAST_ACTIVITY
          - LAST_YEAR
          - THIS_WEEK
          - THIS_MONTH
          - THIS_YEAR
          - THIS_QUARTER
          - CUSTOM_RANGE
          - ALL_CONVERSATIONS
        example: CUSTOM_RANGE
      - name: fromDateTime
        in: query
        description: |-
          Required when timePeriod is CUSTOM_RANGE
          Specifies the date and time (UTC) on or after which calls (based on call start time) and emails must have occurred to be included when generating the answer.
          Date and time (in ISO-8601 format: '2024-10-18T08:00:00Z', where Z stands for UTC).
        required: false
        style: form
        explode: true
        schema:
          type: string
        example: '2024-01-01T00:00:00Z'
      - name: toDateTime
        in: query
        description: |-
          Relevant only when timePeriod is CUSTOM_RANGE
          Specifies the date and time (UTC) before which calls (based on call start time) and emails must have occurred to be included when generating the answer.
          Date and time (in ISO-8601 format: '2024-10-18T08:00:00Z', where Z stands for UTC).
        required: false
        style: form
        explode: true
        schema:
          type: string
        example: '2024-12-31T23:59:59Z'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenerateBriefResponse"
        '400':
          description: Malformed request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Access denied
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '402':
          description: Payment Required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: NotFound
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '429':
          description: API request limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before making a new request.
              style: simple
              explode: false
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '500':
          description: Failed to complete the operation due to an unexpected error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
