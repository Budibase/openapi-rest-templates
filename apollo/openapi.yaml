openapi: 3.0.3
info:
  title: Apollo.io
  version: 1.0.0
  description: Sales intelligence, lead enrichment, prospecting, and engagement data.
servers:
- url: https://api.apollo.io/api/v1
security:
- apolloApiKey: []
paths:
  "/people/match":
    post:
      tags:
      - People Enrichment
      summary: Enrich a single person
      description: Enriches a person's profile with additional data based on provided identifiers (email, name, company, etc.)
      operationId: PeopleEnrichment_enrichPerson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: First name of the person
                  example: John
                last_name:
                  type: string
                  description: Last name of the person
                  example: Doe
                email:
                  type: string
                  format: email
                  description: Email address of the person
                  example: john.doe@example.com
                organization_name:
                  type: string
                  description: Company name where the person works
                  example: Acme Corp
                domain:
                  type: string
                  description: Company domain
                  example: acme.com
                linkedin_url:
                  type: string
                  format: uri
                  description: LinkedIn profile URL
                  example: https://www.linkedin.com/in/johndoe
                reveal_personal_emails:
                  type: boolean
                  description: Whether to reveal personal email addresses
                  default: false
                reveal_phone_number:
                  type: boolean
                  description: Whether to reveal phone numbers
                  default: false
      responses:
        '200':
          description: Successfully enriched person data
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PersonEnrichmentResponse"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/people/bulk_match":
    post:
      tags:
      - People Enrichment
      summary: Bulk enrich people
      description: Enriches multiple people's profiles in a single request (up to 10 records)
      operationId: PeopleEnrichment_bulkEnrichPeople
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                details:
                  type: array
                  maxItems: 10
                  items:
                    type: object
                    properties:
                      first_name:
                        type: string
                      last_name:
                        type: string
                      email:
                        type: string
                        format: email
                      organization_name:
                        type: string
                      domain:
                        type: string
                      linkedin_url:
                        type: string
                        format: uri
                reveal_personal_emails:
                  type: boolean
                  default: false
                reveal_phone_number:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Successfully enriched people data
          content:
            application/json:
              schema:
                type: object
                properties:
                  matches:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Person"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/organizations/enrich":
    post:
      tags:
      - Organization Enrichment
      summary: Enrich a single organization
      description: Enriches an organization's profile with additional data based on domain or company name
      operationId: OrganizationEnrichment_enrichOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
                  description: Company domain
                  example: acme.com
                organization_name:
                  type: string
                  description: Company name
                  example: Acme Corp
      responses:
        '200':
          description: Successfully enriched organization data
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OrganizationEnrichmentResponse"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/organizations/bulk_enrich":
    post:
      tags:
      - Organization Enrichment
      summary: Bulk enrich organizations
      description: Enriches multiple organizations in a single request (up to 10 records)
      operationId: OrganizationEnrichment_bulkEnrichOrganizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                details:
                  type: array
                  maxItems: 10
                  items:
                    type: object
                    properties:
                      domain:
                        type: string
                      organization_name:
                        type: string
      responses:
        '200':
          description: Successfully enriched organizations data
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Organization"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/organizations/{id}":
    get:
      tags:
      - Organization Data
      summary: Get complete organization info
      description: Retrieve comprehensive information about a specific organization
      operationId: OrganizationData_getOrganization
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The Apollo organization ID
      responses:
        '200':
          description: Organization data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    "$ref": "#/components/schemas/Organization"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/mixed_companies/search":
    post:
      tags:
      - Organization Search
      summary: Search for organizations
      description: Search Apollo's database of organizations with advanced filtering options
      operationId: OrganizationSearch_searchOrganizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                q_organization_keyword_tags:
                  type: array
                  items:
                    type: string
                  description: Keywords to search organizations
                organization_locations:
                  type: array
                  items:
                    type: string
                  description: Company locations
                organization_num_employees_ranges:
                  type: array
                  items:
                    type: string
                    enum:
                    - 1-10
                    - 11-50
                    - 51-200
                    - 201-500
                    - 501-1000
                    - 1001-5000
                    - 5001-10000
                    - 10001+
                organization_industry_tag_ids:
                  type: array
                  items:
                    type: string
                  description: Industry tags
                organization_ids:
                  type: array
                  items:
                    type: string
                  description: Specific organization IDs
                page:
                  type: integer
                  minimum: 1
                  default: 1
                per_page:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 25
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OrganizationSearchResponse"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/news_articles/search":
    post:
      tags:
      - News & Intelligence
      summary: Search for news articles
      description: Search for news articles related to organizations
      operationId: NewsIntelligence_searchNewsArticles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                organization_ids:
                  type: array
                  items:
                    type: string
                  description: Organization IDs to search news for
                page:
                  type: integer
                  minimum: 1
                  default: 1
                per_page:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 25
      responses:
        '200':
          description: News articles retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items:
                      "$ref": "#/components/schemas/NewsArticle"
                  pagination:
                    "$ref": "#/components/schemas/Pagination"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/contacts":
    post:
      tags:
      - Contacts (CRM)
      summary: Create a contact
      description: Create a new contact in Apollo CRM
      operationId: ContactsCRM_createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ContactInput"
      responses:
        '200':
          description: Contact created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact:
                    "$ref": "#/components/schemas/Contact"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
    get:
      tags:
      - Contacts (CRM)
      summary: Search for contacts
      description: Search and filter contacts in your Apollo CRM
      operationId: ContactsCRM_searchContacts
      parameters:
      - name: q_keywords
        in: query
        schema:
          type: string
        description: Keywords to search for
      - name: contact_stage_ids
        in: query
        schema:
          type: array
          items:
            type: string
        description: Filter by contact stage IDs
        style: form
        explode: true
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: per_page
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      responses:
        '200':
          description: Contacts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Contact"
                  pagination:
                    "$ref": "#/components/schemas/Pagination"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/contacts/{id}":
    get:
      tags:
      - Contacts (CRM)
      summary: View a contact
      description: Retrieve details of a specific contact
      operationId: ContactsCRM_getContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Contact ID
      responses:
        '200':
          description: Contact retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact:
                    "$ref": "#/components/schemas/Contact"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
    put:
      tags:
      - Contacts (CRM)
      summary: Update a contact
      description: Update an existing contact in Apollo CRM
      operationId: ContactsCRM_updateContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Contact ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ContactInput"
      responses:
        '200':
          description: Contact updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact:
                    "$ref": "#/components/schemas/Contact"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/contacts/bulk_create":
    post:
      tags:
      - Contacts (CRM)
      summary: Bulk create contacts
      description: Create multiple contacts in a single request
      operationId: ContactsCRM_bulkCreateContacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contacts:
                  type: array
                  items:
                    "$ref": "#/components/schemas/ContactInput"
      responses:
        '200':
          description: Contacts created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Contact"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/contacts/bulk_update":
    post:
      tags:
      - Contacts (CRM)
      summary: Bulk update contacts
      description: Update multiple contacts in a single request
      operationId: ContactsCRM_bulkUpdateContacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contacts:
                  type: array
                  items:
                    allOf:
                    - type: object
                      properties:
                        id:
                          type: string
                          description: Contact ID
                      required:
                      - id
                    - "$ref": "#/components/schemas/ContactInput"
      responses:
        '200':
          description: Contacts updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Contact"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/contacts/{id}/stage":
    put:
      tags:
      - Contacts (CRM)
      summary: Update contact stage
      description: Update the stage of a specific contact
      operationId: ContactsCRM_updateContactStage
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Contact ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_stage_id:
                  type: string
                  description: New stage ID for the contact
              required:
              - contact_stage_id
      responses:
        '200':
          description: Contact stage updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact:
                    "$ref": "#/components/schemas/Contact"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/contacts/{id}/owner":
    put:
      tags:
      - Contacts (CRM)
      summary: Update contact ownership
      description: Update the owner of a specific contact
      operationId: ContactsCRM_updateContactOwner
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Contact ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner_id:
                  type: string
                  description: New owner user ID
              required:
              - owner_id
      responses:
        '200':
          description: Contact owner updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact:
                    "$ref": "#/components/schemas/Contact"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/contact_stages":
    get:
      tags:
      - Contacts (CRM)
      summary: List contact stages
      description: Retrieve all available contact stages
      operationId: ContactsCRM_listContactStages
      responses:
        '200':
          description: Contact stages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact_stages:
                    type: array
                    items:
                      "$ref": "#/components/schemas/ContactStage"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/opportunities":
    post:
      tags:
      - Deals (Opportunities)
      summary: Create a deal
      description: Create a new deal/opportunity in Apollo CRM
      operationId: DealsOpportunities_createDeal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/DealInput"
      responses:
        '200':
          description: Deal created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  opportunity:
                    "$ref": "#/components/schemas/Deal"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
    get:
      tags:
      - Deals (Opportunities)
      summary: List all deals
      description: Retrieve a list of all deals/opportunities
      operationId: DealsOpportunities_listDeals
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: per_page
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      responses:
        '200':
          description: Deals retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  opportunities:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Deal"
                  pagination:
                    "$ref": "#/components/schemas/Pagination"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/opportunities/{id}":
    get:
      tags:
      - Deals (Opportunities)
      summary: View a deal
      description: Retrieve details of a specific deal
      operationId: DealsOpportunities_getDeal
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Deal ID
      responses:
        '200':
          description: Deal retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  opportunity:
                    "$ref": "#/components/schemas/Deal"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
    put:
      tags:
      - Deals (Opportunities)
      summary: Update a deal
      description: Update an existing deal/opportunity
      operationId: DealsOpportunities_updateDeal
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Deal ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/DealInput"
      responses:
        '200':
          description: Deal updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  opportunity:
                    "$ref": "#/components/schemas/Deal"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/opportunity_stages":
    get:
      tags:
      - Deals (Opportunities)
      summary: List deal stages
      description: Retrieve all available deal/opportunity stages
      operationId: DealsOpportunities_listDealStages
      responses:
        '200':
          description: Deal stages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  opportunity_stages:
                    type: array
                    items:
                      "$ref": "#/components/schemas/DealStage"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/emailer_campaigns/search":
    post:
      tags:
      - Sequences & Engagement
      summary: Search for sequences
      description: Search for email sequences (campaigns) in Apollo
      operationId: SequencesEngagement_searchSequences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: integer
                  minimum: 1
                  default: 1
                per_page:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 25
      responses:
        '200':
          description: Sequences retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailer_campaigns:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Sequence"
                  pagination:
                    "$ref": "#/components/schemas/Pagination"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/emailer_campaigns/{id}/add_contact_ids":
    post:
      tags:
      - Sequences & Engagement
      summary: Add contacts to sequence
      description: Add one or more contacts to an email sequence
      operationId: SequencesEngagement_addContactsToSequence
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Sequence/campaign ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_ids:
                  type: array
                  items:
                    type: string
                  description: Array of contact IDs to add
                sequence_active_in_other_campaigns:
                  type: boolean
                  description: Whether to add contacts already in other sequences
                  default: false
                mailbox_id:
                  type: string
                  description: Specific mailbox to use for sending
              required:
              - contact_ids
      responses:
        '200':
          description: Contacts added to sequence successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        contact_id:
                          type: string
                        emailer_campaign_id:
                          type: string
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/emailer_campaigns/{emailer_campaign_id}/emailer_touches/{emailer_touch_id}":
    put:
      tags:
      - Sequences & Engagement
      summary: Update contact status in sequence
      description: Update the status of a contact within a sequence (pause, resume, finish)
      operationId: SequencesEngagement_updateContactSequenceStatus
      parameters:
      - name: emailer_campaign_id
        in: path
        required: true
        schema:
          type: string
        description: Sequence/campaign ID
      - name: emailer_touch_id
        in: path
        required: true
        schema:
          type: string
        description: Touch/contact ID within the sequence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - paused
                  - active
                  - finished
                  description: New status for the contact in the sequence
              required:
              - status
      responses:
        '200':
          description: Contact status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailer_touch:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '404':
          "$ref": "#/components/responses/NotFound"
        '429':
          "$ref": "#/components/responses/RateLimitExceeded"
  "/emailer_messages/search":
    post:
      tags:
      - Sequences & Engagement
      summary: Search for outreach emails
      description: Search for sent outreach emails from sequences
