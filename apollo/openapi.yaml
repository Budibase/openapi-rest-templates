components:
  schemas:
    ApiUsageStats:
      type: object
      properties:
        daily_api_credit_used:
          type: integer
        daily_api_credits_available:
          type: integer
        daily_email_credits_used:
          type: integer
        daily_email_credits_available:
          type: integer
        daily_export_credits_used:
          type: integer
        daily_export_credits_available:
          type: integer
        daily_mobile_credits_used:
          type: integer
        daily_mobile_credits_available:
          type: integer
    Call:
      type: object
      properties:
        id:
          type: string
        note:
          type: string
        disposition:
          type: string
        duration:
          type: integer
          description: Call duration in seconds
        recorded_at:
          type: string
          format: date-time
        user_id:
          type: string
        contact_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CallInput:
      type: object
      required:
      - contact_id
      properties:
        contact_id:
          type: string
        note:
          type: string
        disposition:
          type: string
          description: Call outcome (e.g., "Connected", "Left voicemail", "No answer")
        duration:
          type: integer
          description: Call duration in seconds
        recorded_at:
          type: string
          format: date-time
        user_id:
          type: string
    Contact:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        name:
          type: string
        title:
          type: string
        email:
          type: string
          format: email
        account_id:
          type: string
        account:
          "$ref": "#/components/schemas/Organization"
        owner_id:
          type: string
        contact_stage_id:
          type: string
        phone_numbers:
          type: array
          items:
            type: object
            properties:
              number:
                type: string
              type:
                type: string
        label_names:
          type: array
          items:
            type: string
        typed_custom_fields:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ContactInput:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        title:
          type: string
        account_id:
          type: string
          description: Organization/account ID
        owner_id:
          type: string
          description: User ID of the owner
        contact_stage_id:
          type: string
        label_names:
          type: array
          items:
            type: string
        phone_numbers:
          type: array
          items:
            type: object
            properties:
              number:
                type: string
              type:
                type: string
                enum:
                - work
                - mobile
                - home
                - other
        typed_custom_fields:
          type: object
          additionalProperties: true
          description: Custom field values
    ContactList:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        num_contacts:
          type: integer
        created_at:
          type: string
          format: date-time
    ContactStage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
    CustomField:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        field_type:
          type: string
          enum:
          - string
          - number
          - date
          - boolean
          - select
          - multi_select
        applies_to:
          type: string
          enum:
