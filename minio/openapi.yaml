openapi: 3.0.0
info:
  title: MinIO S3-Compatible API
  version: 2006-03-01
  description: OpenAPI for MinIO S3-compatible APIs documented as supported by MinIO.
servers:
- url: http://{minioHost}:{minioPort}
  description: MinIO S3 API endpoint (HTTP)
  variables:
    minioHost:
      default: localhost
      description: MinIO host
    minioPort:
      default: '9000'
      description: MinIO API port
- url: https://{minioHost}:{minioPort}
  description: MinIO S3 API endpoint (HTTPS)
  variables:
    minioHost:
      default: localhost
      description: MinIO host
    minioPort:
      default: '9000'
      description: MinIO API port
paths:
  "/{Bucket}/{Key}#uploadId":
    parameters:
    - "$ref": "#/components/parameters/x-amz-security-token"
    get:
      operationId: ListParts
      responses:
        '200':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/ListPartsOutput"
      parameters:
      - name: Bucket
        in: path
        required: true
        schema:
          type: string
      - name: Key
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      - name: max-parts
        in: query
        required: false
        schema:
          type: integer
      - name: part-number-marker
        in: query
        required: false
        schema:
          type: integer
      - name: uploadId
        in: query
        required: true
        schema:
          type: string
      - name: x-amz-request-payer
        in: header
        required: false
        schema:
          type: string
          enum:
          - requester
      - name: x-amz-expected-bucket-owner
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-server-side-encryption-customer-algorithm
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-server-side-encryption-customer-key
        in: header
        required: false
        schema:
          type: string
          format: password
      - name: x-amz-server-side-encryption-customer-key-MD5
        in: header
        required: false
        schema:
          type: string
      - name: MaxParts
        in: query
        schema:
          type: string
        required: false
      - name: PartNumberMarker
        in: query
        schema:
          type: string
        required: false
    post:
      operationId: CompleteMultipartUpload
      responses:
        '200':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/CompleteMultipartUploadOutput"
      parameters:
      - name: Bucket
        in: path
        required: true
        schema:
          type: string
      - name: Key
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      - name: uploadId
        in: query
        required: true
        schema:
          type: string
      - name: x-amz-checksum-crc32
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-checksum-crc32c
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-checksum-sha1
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-checksum-sha256
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-request-payer
        in: header
        required: false
        schema:
          type: string
          enum:
          - requester
      - name: x-amz-expected-bucket-owner
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-server-side-encryption-customer-algorithm
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-server-side-encryption-customer-key
        in: header
        required: false
        schema:
          type: string
          format: password
      - name: x-amz-server-side-encryption-customer-key-MD5
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          text/xml:
            schema:
              type: object
              properties:
                CompleteMultipartUpload:
                  type: object
                  properties:
                    Parts:
                      allOf:
                      - "$ref": "#/components/schemas/CompletedPartList"
                      - xml:
                          name: Part
    delete:
      operationId: AbortMultipartUpload
      responses:
        '204':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/AbortMultipartUploadOutput"
        '480':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/NoSuchUpload"
      parameters:
      - name: Bucket
        in: path
        required: true
        schema:
          type: string
      - name: Key
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      - name: uploadId
        in: query
        required: true
        schema:
          type: string
      - name: x-amz-request-payer
        in: header
        required: false
        schema:
          type: string
          enum:
          - requester
      - name: x-amz-expected-bucket-owner
        in: header
        required: false
        schema:
          type: string
  "/{Bucket}/{Key}#x-amz-copy-source":
    parameters:
    - "$ref": "#/components/parameters/x-amz-security-token"
    put:
      operationId: CopyObject
      responses:
        '200':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/CopyObjectOutput"
        '480':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/ObjectNotInActiveTierError"
      parameters:
      - name: x-amz-acl
        in: header
        required: false
        schema:
          type: string
          enum:
          - private
          - public-read
          - public-read-write
          - authenticated-read
          - bucket-owner-read
          - bucket-owner-full-control
      - name: Bucket
        in: path
        required: true
        schema:
          type: string
      - name: Cache-Control
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-checksum-algorithm
        in: header
        required: false
        schema:
          type: string
          enum:
          - CRC32
          - CRC32C
          - SHA1
          - SHA256
      - name: Content-Disposition
        in: header
        required: false
        schema:
          type: string
      - name: Content-Encoding
        in: header
        required: false
        schema:
          type: string
      - name: Content-Language
        in: header
        required: false
        schema:
          type: string
      - name: Content-Type
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-copy-source
        in: header
        required: true
        schema:
          type: string
          pattern: "\\/.+\\/.+"
      - name: x-amz-copy-source-if-match
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-copy-source-if-modified-since
        in: header
        required: false
        schema:
          type: string
          format: date-time
      - name: x-amz-copy-source-if-none-match
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-copy-source-if-unmodified-since
        in: header
        required: false
        schema:
          type: string
          format: date-time
      - name: Expires
        in: header
        required: false
        schema:
          type: string
          format: date-time
      - name: x-amz-grant-full-control
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-grant-read
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-grant-read-acp
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-grant-write-acp
        in: header
        required: false
        schema:
          type: string
      - name: Key
        in: path
        required: true
        schema:
          type: string
          minLength: 1
      - name: x-amz-metadata-directive
        in: header
        required: false
        schema:
          type: string
          enum:
          - COPY
          - REPLACE
      - name: x-amz-tagging-directive
        in: header
        required: false
        schema:
          type: string
          enum:
          - COPY
          - REPLACE
      - name: x-amz-server-side-encryption
        in: header
        required: false
        schema:
          type: string
          enum:
          - AES256
          - aws:kms
      - name: x-amz-storage-class
        in: header
        required: false
        schema:
          type: string
          enum:
          - STANDARD
          - REDUCED_REDUNDANCY
          - STANDARD_IA
          - ONEZONE_IA
          - INTELLIGENT_TIERING
          - GLACIER
          - DEEP_ARCHIVE
          - OUTPOSTS
          - GLACIER_IR
          - SNOW
      - name: x-amz-website-redirect-location
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-server-side-encryption-customer-algorithm
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-server-side-encryption-customer-key
        in: header
        required: false
        schema:
          type: string
          format: password
      - name: x-amz-server-side-encryption-customer-key-MD5
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-server-side-encryption-aws-kms-key-id
        in: header
        required: false
        schema:
          type: string
          format: password
      - name: x-amz-server-side-encryption-context
        in: header
        required: false
        schema:
          type: string
          format: password
      - name: x-amz-server-side-encryption-bucket-key-enabled
        in: header
        required: false
        schema:
          type: boolean
      - name: x-amz-copy-source-server-side-encryption-customer-algorithm
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-copy-source-server-side-encryption-customer-key
        in: header
        required: false
        schema:
          type: string
          format: password
      - name: x-amz-copy-source-server-side-encryption-customer-key-MD5
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-request-payer
        in: header
        required: false
        schema:
          type: string
          enum:
          - requester
      - name: x-amz-tagging
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-object-lock-mode
        in: header
        required: false
        schema:
          type: string
          enum:
          - GOVERNANCE
          - COMPLIANCE
      - name: x-amz-object-lock-retain-until-date
        in: header
        required: false
        schema:
          type: string
          format: date-time
      - name: x-amz-object-lock-legal-hold
        in: header
        required: false
        schema:
          type: string
          enum:
          - true
          - false
      - name: x-amz-expected-bucket-owner
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-source-expected-bucket-owner
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          text/xml:
            schema:
              type: object
              properties:
                x-amz-meta-:
                  type: object
                  additionalProperties:
                    "$ref": "#/components/schemas/MetadataValue"
  "/{Bucket}":
    parameters:
    - "$ref": "#/components/parameters/x-amz-security-token"
    get:
      operationId: ListObjects
      responses:
        '200':
          content:
