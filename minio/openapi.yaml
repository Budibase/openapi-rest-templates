                "$ref": "#/components/schemas/ListObjectsOutput"
        '480':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/NoSuchBucket"
      parameters:
      - name: Bucket
        in: path
        required: true
        schema:
          type: string
      - name: delimiter
        in: query
        required: false
        schema:
          type: string
      - name: encoding-type
        in: query
        required: false
        schema:
          type: string
          enum:
          - url
      - name: marker
        in: query
        required: false
        schema:
          type: string
      - name: max-keys
        in: query
        required: false
        schema:
          type: integer
      - name: prefix
        in: query
        required: false
        schema:
          type: string
      - name: x-amz-request-payer
        in: header
        required: false
        schema:
          type: string
          enum:
          - requester
      - name: x-amz-expected-bucket-owner
        in: header
        required: false
        schema:
          type: string
      - name: MaxKeys
        in: query
        schema:
          type: string
        required: false
      - name: Marker
        in: query
        schema:
          type: string
        required: false
    put:
      operationId: CreateBucket
      responses:
        '200':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/CreateBucketOutput"
        '480':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/BucketAlreadyExists"
        '481':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/BucketAlreadyOwnedByYou"
      parameters:
      - name: x-amz-acl
        in: header
        required: false
        schema:
          type: string
          enum:
          - private
          - public-read
          - public-read-write
          - authenticated-read
      - name: Bucket
        in: path
        required: true
        schema:
          type: string
      - name: x-amz-grant-full-control
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-grant-read
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-grant-read-acp
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-grant-write
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-grant-write-acp
        in: header
        required: false
        schema:
          type: string
      - name: x-amz-bucket-object-lock-enabled
        in: header
        required: false
        schema:
          type: boolean
      - name: x-amz-object-ownership
        in: header
        required: false
        schema:
          type: string
          enum:
          - BucketOwnerPreferred
          - ObjectWriter
          - BucketOwnerEnforced
      requestBody:
        required: true
        content:
          text/xml:
            schema:
              type: object
              properties:
                CreateBucketConfiguration:
                  type: object
                  properties:
                    LocationConstraint:
                      allOf:
                      - "$ref": "#/components/schemas/BucketLocationConstraint"
                      - {}
    delete:
      operationId: DeleteBucket
      responses:
        '204': {}
      parameters:
      - name: Bucket
        in: path
        required: true
        schema:
          type: string
      - name: x-amz-expected-bucket-owner
        in: header
        required: false
        schema:
          type: string
    head:
      operationId: HeadBucket
      responses:
        '200': {}
        '480':
          content:
            text/xml:
              schema:
                "$ref": "#/components/schemas/NoSuchBucket"
      parameters:
      - name: Bucket
        in: path
        required: true
        schema:
          type: string
      - name: x-amz-expected-bucket-owner
        in: header
        required: false
        schema:
          type: string
