openapi: 3.0.1
info:
  title: Pipedrive
  version: 1.0.0
  description: Sales CRM and pipeline management.
  license:
    name: MIT
    url: "https://opensource.org/licenses/MIT"
servers:
  - url: "https://api.pipedrive.com/v1"
security:
  - pipedriveApiToken: []
tags:
  - name: Activities
    description: Activities operations.
  - name: ActivityFields
    description: ActivityFields operations.
  - name: ActivityTypes
    description: ActivityTypes operations.
  - name: Billing
    description: Billing operations.
  - name: CallLogs
    description: CallLogs operations.
  - name: Currencies
    description: Currencies operations.
  - name: DealFields
    description: DealFields operations.
  - name: Deals
    description: Deals operations.
  - name: Files
    description: Files operations.
  - name: Filters
    description: Filters operations.
  - name: Goals
    description: Goals operations.
  - name: ItemSearch
    description: ItemSearch operations.
  - name: LeadLabels
    description: LeadLabels operations.
  - name: LeadSources
    description: LeadSources operations.
  - name: Leads
    description: Leads operations.
  - name: Mailbox
    description: Mailbox operations.
  - name: Meetings
    description: Meetings operations.
  - name: NoteFields
    description: NoteFields operations.
  - name: Notes
    description: Notes operations.
  - name: OrganizationFields
    description: OrganizationFields operations.
  - name: OrganizationRelationships
    description: OrganizationRelationships operations.
  - name: Organizations
    description: Organizations operations.
  - name: PermissionSets
    description: PermissionSets operations.
  - name: PersonFields
    description: PersonFields operations.
  - name: Persons
    description: Persons operations.
  - name: Pipelines
    description: Pipelines operations.
  - name: ProductFields
    description: ProductFields operations.
  - name: Products
    description: Products operations.
  - name: ProjectTemplates
    description: ProjectTemplates operations.
  - name: Projects
    description: Projects operations.
  - name: Recents
    description: Recents operations.
  - name: Roles
    description: Roles operations.
  - name: Stages
    description: Stages operations.
  - name: Subscriptions
    description: Subscriptions operations.
  - name: Tasks
    description: Tasks operations.
  - name: UserConnections
    description: UserConnections operations.
  - name: UserSettings
    description: UserSettings operations.
  - name: Users
    description: Users operations.
  - name: Webhooks
    description: Webhooks operations.
paths:
  /activities:
    delete:
      tags:
        - Activities
      summary: Delete multiple activities in bulk
      operationId: Activities_deleteBulk
      description: "Marks multiple activities as deleted. After 30 days, the activities will be permanently deleted."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - Activities
      summary: Get all activities assigned to a particular user
      operationId: Activities_listUserActivities
      description: Returns all activities assigned to a particular user.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Activities
      summary: Add an activity
      operationId: Activities_addNewActivity
      description: "Adds a new activity. Includes more_activities_scheduled_in_context property in response’s additional_data which indicates whether there are more undone activities scheduled with the same deal, person or organization (depending on the supplied data). For more information, see the tutorial for adding an activity."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /activities/collection:
    get:
      tags:
        - Activities
      summary: Get all activities (BETA)
      operationId: Activities_getAllActivities
      description: "Returns all activities. This is a cursor-paginated endpoint that is currently in BETA. For more information, please refer to our documentation on pagination. Please note that only global admins (those with global permissions) can access these endpoints. Users with regular permissions will receive a 403 response. Read more about global permissions here."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/activities/{id}":
    delete:
      tags:
        - Activities
      summary: Delete an activity
      operationId: Activities_markAsDeleted
      description: "Marks an activity as deleted. After 30 days, the activity will be permanently deleted."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - Activities
      summary: Get details of an activity
      operationId: Activities_getDetails
      description: Returns the details of a specific activity.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    put:
      tags:
        - Activities
      summary: Update an activity
      operationId: Activities_updateActivityDetails
      description: "Updates an activity. Includes more_activities_scheduled_in_context property in response’s additional_data which indicates whether there are more undone activities scheduled with the same deal, person or organization (depending on the supplied data)."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /activityFields:
    get:
      tags:
        - ActivityFields
      summary: Get all activity fields
      operationId: ActivityFields_getAll
      description: Returns all activity fields.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /activityTypes:
    delete:
      tags:
        - ActivityTypes
      summary: Delete multiple activity types in bulk
      operationId: ActivityTypes_markAsDeletedBulk
      description: Marks multiple activity types as deleted.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - ActivityTypes
      summary: Get all activity types
      operationId: ActivityTypes_listAllActivityTypes
      description: Returns all activity types.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - ActivityTypes
      summary: Add new activity type
      operationId: ActivityTypes_addNewType
      description: Adds a new activity type.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/activityTypes/{id}":
    delete:
      tags:
        - ActivityTypes
      summary: Delete an activity type
      operationId: ActivityTypes_markAsDeleted
      description: Marks an activity type as deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    put:
      tags:
        - ActivityTypes
      summary: Update an activity type
      operationId: ActivityTypes_updateType
      description: Updates an activity type.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /billing/subscriptions/addons:
    get:
      tags:
        - Billing
      summary: "Get all add-ons for a single company"
      operationId: Billing_getAddonsForSingleCompany
      description: "Returns the add-ons for a single company."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /callLogs:
    get:
      tags:
        - CallLogs
      summary: Get all call logs assigned to a particular user
      operationId: CallLogs_getAllLogs
      description: Returns all call logs assigned to a particular user.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - CallLogs
      summary: Add a call log
      operationId: CallLogs_addNewLog
      description: Adds a new call log.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/callLogs/{id}":
    delete:
      tags:
        - CallLogs
      summary: Delete a call log
      operationId: CallLogs_deleteLog
      description: "Deletes a call log. If there is an audio recording attached to it, it will also be deleted. The related activity will not be removed by this request. If you want to remove the related activities, please use the endpoint which is specific for activities."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - CallLogs
      summary: Get details of a call log
      operationId: CallLogs_getDetails
      description: Returns details of a specific call log.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/callLogs/{id}/recordings":
    post:
      tags:
        - CallLogs
      summary: Attach an audio file to the call log
      operationId: CallLogs_attachRecording
      description: Adds an audio recording to the call log. That audio can be played by those who have access to the call log object.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /currencies:
    get:
      tags:
        - Currencies
      summary: Get all supported currencies
      operationId: Currencies_getAllSupported
      description: "Returns all supported currencies in given account which should be used when saving monetary values with other objects. The code parameter of the returning objects is the currency code according to ISO 4217 for all non-custom currencies."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /dealFields:
    delete:
      tags:
        - DealFields
      summary: Delete multiple deal fields in bulk
      operationId: DealFields_deleteMultipleBulk
      description: Marks multiple deal fields as deleted.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - DealFields
      summary: Get all deal fields
      operationId: DealFields_getAllFields
      description: Returns data about all deal fields.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - DealFields
      summary: Add a new deal field
      operationId: DealFields_addNewField
      description: "Adds a new deal field. For more information, see the tutorial for adding a new custom field."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/dealFields/{id}":
    delete:
      tags:
        - DealFields
      summary: Delete a deal field
      operationId: DealFields_markAsDeleted
      description: "Marks a field as deleted. For more information, see the tutorial for deleting a custom field."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - DealFields
      summary: Get one deal field
      operationId: DealFields_getOneField
      description: Returns data about a specific deal field.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    put:
      tags:
        - DealFields
      summary: Update a deal field
      operationId: DealFields_updateField
      description: "Updates a deal field. For more information, see the tutorial for updating custom fields’ values."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /deals:
    delete:
      tags:
        - Deals
      summary: Delete multiple deals in bulk
      operationId: Deals_deleteBulk
      description: "Marks multiple deals as deleted. After 30 days, the deals will be permanently deleted."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - Deals
      summary: Get all deals
      operationId: Deals_getAllDeals
      description: "Returns all deals. For more information, see the tutorial for getting all deals."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - Deals
      summary: Add a deal
      operationId: Deals_createDeal
      description: "Adds a new deal. Note that you can supply additional custom fields along with the request that are not described here. These custom fields are different for each Pipedrive account and can be recognized by long hashes as keys. To determine which custom fields exists, fetch the dealFields and look for key values. For more information, see the tutorial for adding a deal."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /deals/collection:
    get:
      tags:
        - Deals
      summary: Get all deals (BETA)
      operationId: Deals_getAllDeals_2
      description: "Returns all deals. This is a cursor-paginated endpoint that is currently in BETA. For more information, please refer to our documentation on pagination. Please note that only global admins (those with global permissions) can access these endpoints. Users with regular permissions will receive a 403 response. Read more about global permissions here."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /deals/search:
    get:
      tags:
        - Deals
      summary: Search deals
      operationId: Deals_searchByTitleAndNotes
      description: "Searches all deals by title, notes and/or custom fields. This endpoint is a wrapper of /v1/itemSearch with a narrower OAuth scope. Found deals can be filtered by the person ID and the organization ID."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /deals/summary:
    get:
      tags:
        - Deals
      summary: Get deals summary
      operationId: Deals_getSummary
      description: Returns a summary of all the deals.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /deals/timeline:
    get:
      tags:
        - Deals
      summary: Get deals timeline
      operationId: Deals_getTimelineData
      description: "Returns open and won deals, grouped by a defined interval of time set in a date-type dealField (field_key) — e.g. when month is the chosen interval, and 3 months are asked starting from January 1st, 2012, deals are returned grouped into 3 groups — January, February and March — based on the value of the given field_key."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/deals/{id}":
    delete:
      tags:
        - Deals
      summary: Delete a deal
      operationId: Deals_markAsDeleted
      description: "Marks a deal as deleted. After 30 days, the deal will be permanently deleted."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    get:
      tags:
        - Deals
      summary: Get details of a deal
      operationId: Deals_getDetails
      description: "Returns the details of a specific deal. Note that this also returns some additional fields which are not present when asking for all deals – such as deal age and stay in pipeline stages. Also note that custom fields appear as long hashes in the resulting data. These hashes can be mapped against the key value of dealFields. For more information, see the tutorial for getting details of a deal."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    put:
      tags:
        - Deals
      summary: Update a deal
      operationId: Deals_updateProperties
      description: "Updates the properties of a deal. For more information, see the tutorial for updating a deal."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/deals/{id}/activities":
    get:
      tags:
        - Deals
      summary: List activities associated with a deal
      operationId: Deals_listActivities
      description: Lists activities associated with a deal.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/deals/{id}/changelog":
    get:
      tags:
        - Deals
      summary: List updates about deal field values
      operationId: Deals_listChangelog
      description: Lists updates about field values of a deal.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/deals/{id}/duplicate":
    post:
      tags:
        - Deals
      summary: Duplicate deal
      operationId: Deals_duplicateDeal
      description: Duplicates a deal.
      parameters:
        - name: id
          in: path
          required: true
