components:
  securitySchemes:
    pipedriveApiToken:
      type: apiKey
      in: query
      name: api_token
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    GenericResponse:
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items:
            type: object
            additionalProperties: true
    ErrorResponse:
      type: object
      additionalProperties: true
