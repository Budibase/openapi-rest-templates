      summary: Get bounce counts
      operationId: Stats_getBounceCounts
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BounceStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/spam:
    get:
      tags:
        - Stats
      summary: Get spam complaint counts
      operationId: Stats_getSpamComplaintCounts
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/tracked:
    get:
      tags:
        - Stats
      summary: Get tracked email counts
      operationId: Stats_getTrackedEmailCounts
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackedStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/opens:
    get:
      tags:
        - Stats
      summary: Get email open counts
      operationId: Stats_getEmailOpenCounts
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/opens/platforms:
    get:
      tags:
        - Stats
      summary: Get email platform usage
      operationId: Stats_getEmailPlatformUsage
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/opens/emailclients:
    get:
      tags:
        - Stats
      summary: Get email client usage
      operationId: Stats_getEmailClientUsage
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/clicks:
    get:
      tags:
        - Stats
      summary: Get click counts
      operationId: Stats_getClickCounts
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClickStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/clicks/browserfamilies:
    get:
      tags:
        - Stats
      summary: Get browser usage by family
      operationId: Stats_getClickBrowserFamilies
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/clicks/platforms:
    get:
      tags:
        - Stats
      summary: Get browser platform usage
      operationId: Stats_getClickBrowserPlatforms
      parameters:
