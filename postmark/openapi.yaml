        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/clicks/location:
    get:
      tags:
        - Stats
      summary: Get click counts by body location
      operationId: Stats_getClickLocation
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClickLocationStatsResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /server:
    get:
      tags:
        - Server Configuration
      summary: Get server configuration
      operationId: ServerConfiguration_getConfiguration
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerConfiguration'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
    put:
      tags:
        - Server Configuration
      summary: Update server configuration
      operationId: ServerConfiguration_updateConfiguration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditServerConfigurationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerConfiguration'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /templates:
    get:
      tags:
        - Templates
      summary: List templates
      operationId: Templates_listTemplates
      parameters:
        - name: Count
          in: query
          required: true
          description: The number of templates to return.
          schema:
            type: number
        - name: Offset
          in: query
          required: true
          description: The number of templates to skip before returning results.
          schema:
            type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateListResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags:
        - Templates
      summary: Create a template
      operationId: Templates_createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /templates/validate:
    post:
      tags:
        - Templates
      summary: Validate template content
      operationId: Templates_validateTemplateContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateValidationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateValidationResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /templates/{templateIdOrAlias}:
    get:
      tags:
        - Templates
      summary: Get a template
      operationId: Templates_getTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateIdOrAlias'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '422':
          $ref: '#/components/responses/Error'
