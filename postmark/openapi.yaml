          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BounceDumpResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /bounces/{bounceid}/activate:
    put:
      tags:
        - Bounces
      summary: Activate a bounce
      operationId: Bounces_activateBounce
      parameters:
        - $ref: '#/components/parameters/BounceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BounceActivationResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /deliverystats:
    get:
      tags:
        - Bounces
      summary: Get delivery stats
      operationId: Bounces_getDeliveryStats
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
