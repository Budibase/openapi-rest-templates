components:
  parameters:
    Count:
      name: count
      in: query
      required: true
      description: Number of records to return per request.
      schema:
        type: integer
        maximum: 500
    Offset:
      name: offset
      in: query
      required: true
      description: Number of records to skip.
      schema:
        type: integer
        minimum: 0
    FromDate:
      name: fromdate
      in: query
      description: Filter records starting from the date specified. For example, 2014-01-01.
      schema:
        type: string
    ToDate:
      name: todate
      in: query
      description: Filter records up to the date specified. For example, 2014-02-01.
      schema:
        type: string
    Tag:
      name: tag
      in: query
      description: Filter by tag.
      schema:
        type: string
    Recipient:
      name: recipient
      in: query
      description: Filter by recipient.
      schema:
        type: string
    ClientName:
      name: client_name
      in: query
      description: Filter by client name.
      schema:
        type: string
    ClientCompany:
      name: client_company
      in: query
      description: Filter by client company.
      schema:
        type: string
    ClientFamily:
      name: client_family
      in: query
      description: Filter by client family.
      schema:
        type: string
    OsName:
      name: os_name
      in: query
      description: Filter by full operating system name.
      schema:
        type: string
    OsFamily:
      name: os_family
      in: query
      description: Filter by operating system family.
      schema:
        type: string
    OsCompany:
      name: os_company
