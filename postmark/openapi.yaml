openapi: 3.0.3
info:
  title: Postmark
  version: 1.0.0
  description: Send transactional email and manage Postmark server resources.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.postmarkapp.com
security:
  - postmarkServerToken: []
tags:
  - name: Sending
    description: Send transactional emails through Postmark.
  - name: Messages
    description: Search inbound and outbound messages.
  - name: Bounces
    description: Inspect and manage message bounces.
  - name: Stats
    description: Retrieve outbound email statistics.
  - name: Server Configuration
    description: View and update the current Postmark server.
  - name: Templates
    description: Manage templates associated with the current server.
  - name: Inbound Rules
    description: Manage inbound rule triggers for the current server.
paths:
  /email:
    post:
      tags:
        - Sending
      summary: Send a single email
      operationId: Sending_sendSingleEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /email/batch:
    post:
      tags:
        - Sending
      summary: Send a batch of emails
      operationId: Sending_sendBatchEmails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailBatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailBatchResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /email/withTemplate:
    post:
      tags:
        - Sending
      summary: Send an email using a template
      operationId: Sending_sendEmailWithTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailWithTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /email/batchWithTemplates:
    post:
      tags:
        - Sending
      summary: Send a batch of emails using templates
      operationId: Sending_sendBatchWithTemplates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailTemplatedBatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailBatchResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /messages/inbound:
    get:
      tags:
        - Messages
      summary: Search inbound messages
      operationId: Messages_searchInboundMessages
      parameters:
        - $ref: '#/components/parameters/Count'
        - $ref: '#/components/parameters/Offset'
        - name: recipient
          in: query
          description: Filter by the recipient email address.
          schema:
            type: string
        - name: fromemail
          in: query
          description: Filter by the sender email address.
          schema:
            type: string
        - name: subject
          in: query
          description: Filter by email subject.
          schema:
            type: string
        - name: mailboxhash
          in: query
          description: Filter by mailbox hash.
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag.
          schema:
            type: string
        - name: status
          in: query
          description: Filter by inbound message status.
          schema:
            type: string
            enum:
              - blocked
              - processed
              - queued
              - failed
              - scheduled
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/FromDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSearchResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /messages/inbound/{messageid}/details:
    get:
      tags:
        - Messages
      summary: Get inbound message details
      operationId: Messages_getInboundMessageDetails
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundMessageDetail'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /messages/inbound/{messageid}/bypass:
    put:
      tags:
        - Messages
      summary: Bypass rules for a blocked inbound message
      operationId: Messages_bypassInboundMessageRules
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /messages/inbound/{messageid}/retry:
    put:
      tags:
        - Messages
      summary: Retry a failed inbound message
      operationId: Messages_retryInboundMessage
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /messages/outbound:
    get:
      tags:
