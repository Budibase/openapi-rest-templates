  /messages/outbound/opens:
    get:
      tags:
        - Messages
      summary: List opens for all outbound messages
      operationId: Messages_listOutboundMessageOpens
      parameters:
        - $ref: '#/components/parameters/Count'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Recipient'
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/ClientName'
        - $ref: '#/components/parameters/ClientCompany'
        - $ref: '#/components/parameters/ClientFamily'
        - $ref: '#/components/parameters/OsName'
        - $ref: '#/components/parameters/OsFamily'
        - $ref: '#/components/parameters/OsCompany'
        - $ref: '#/components/parameters/Platform'
        - $ref: '#/components/parameters/Country'
        - $ref: '#/components/parameters/Region'
        - $ref: '#/components/parameters/City'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenSearchResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /messages/outbound/opens/{messageid}:
    get:
      tags:
        - Messages
      summary: Get opens for an outbound message
      operationId: Messages_getOutboundMessageOpens
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/Count'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenSearchResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /messages/outbound/clicks:
    get:
      tags:
        - Messages
      summary: List clicks for all outbound messages
      operationId: Messages_listOutboundMessageClicks
      parameters:
        - $ref: '#/components/parameters/Count'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Recipient'
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/ClientName'
        - $ref: '#/components/parameters/ClientCompany'
        - $ref: '#/components/parameters/ClientFamily'
        - $ref: '#/components/parameters/OsName'
        - $ref: '#/components/parameters/OsFamily'
        - $ref: '#/components/parameters/OsCompany'
        - $ref: '#/components/parameters/Platform'
        - $ref: '#/components/parameters/Country'
        - $ref: '#/components/parameters/Region'
        - $ref: '#/components/parameters/City'
