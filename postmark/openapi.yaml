        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound:
    get:
      tags:
        - Stats
      summary: Get outbound overview
      operationId: Stats_getOutboundOverview
      parameters:
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundOverviewStats'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /stats/outbound/sends:
