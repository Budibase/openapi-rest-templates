  /bounces:
    get:
      tags:
        - Bounces
      summary: List bounces
      operationId: Bounces_listBounces
      parameters:
        - $ref: '#/components/parameters/Count'
        - $ref: '#/components/parameters/Offset'
        - name: type
          in: query
          description: Filter by bounce type.
          schema:
            type: string
        - name: inactive
          in: query
          description: Filter by recipients deactivated by the bounce.
          schema:
            type: boolean
        - name: emailFilter
          in: query
          description: Filter by email address.
          schema:
            type: string
        - name: messageID
          in: query
          description: Filter by message ID.
          schema:
            type: string
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/FromDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BounceSearchResponse'
        '422':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
  /bounces/{bounceid}:
    get:
