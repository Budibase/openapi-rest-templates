openapi: 3.0.0
info:
  title: Customer.io
  version: 1.0.0
  description: Customer engagement and messaging platform.
  license:
    name: MIT
    url: "https://opensource.org/licenses/MIT"
servers:
  - url: "https://api.customer.io"
security:
  - customerIoAppApiKey: []
tags:
  - name: Activities
    description: Activities operations.
  - name: Broadcasts
    description: Broadcasts operations.
  - name: Campaigns
    description: Campaigns operations.
  - name: Collections
    description: Collections operations.
  - name: Customers
    description: Customers operations.
  - name: ESPSuppression
    description: ESPSuppression operations.
  - name: Exports
    description: Exports operations.
  - name: Imports
    description: Imports operations.
  - name: Info
    description: Info operations.
  - name: Messages
    description: Messages operations.
  - name: Newsletters
    description: Newsletters operations.
  - name: Objects
    description: Objects operations.
  - name: ReportingWebhooks
    description: ReportingWebhooks operations.
  - name: Segments
    description: Segments operations.
  - name: SendMessages
    description: SendMessages operations.
  - name: SenderIdentities
    description: SenderIdentities operations.
  - name: Snippets
    description: Snippets operations.
  - name: SubscriptionCenter
    description: SubscriptionCenter operations.
  - name: Transactional
    description: Transactional operations.
  - name: Workspaces
    description: Workspaces operations.
paths:
  /v1/activities:
    get:
      tags:
        - Activities
      summary: List activities
      operationId: Activities_list
      description: "This endpoint returns a list of “activities” for people, similar to your workspace’s Activity Logs. This endpoint is guaranteed to return activity history within the past 30 days. It might return data older than 30 days in some circumstances, but activites older than 30 days are not guaranteed."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcast/{broadcast_id}/actions/{action_id}/metrics":
    get:
      tags:
        - Broadcasts
      summary: Get broadcast action metrics
      operationId: Broadcasts_getActionMetrics
      description: "Returns a list of metrics for an individual action both in total and in steps (days, weeks, etc) over a period of time. Stepped series metrics return from oldest to newest (i.e. the 0-index for any result is the oldest step/period).\n\nYou cannot request fewer than 2 steps of any period (2 hours, 2 days, 2 weeks, or 2 months). For instance, ?period=days&steps=1 means two days - the 48 hours before the API request was made. ?period=days&steps=0 returns the same as the maximum of the period - ?period=days&steps=45. See the steps parameter below for the maximum count of each period."
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/broadcasts:
    get:
      tags:
        - Broadcasts
      summary: List broadcasts
      operationId: Broadcasts_list
      description: Returns a list of your broadcasts and associated metadata.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}":
    get:
      tags:
        - Broadcasts
      summary: Get a broadcast
      operationId: Broadcasts_getMetadata
      description: Returns metadata for an individual broadcast.
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}/actions":
    get:
      tags:
        - Broadcasts
      summary: List broadcast actions
      operationId: Broadcasts_getActions
      description: Returns the actions that occur as a part of a broadcast.
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}/actions/{action_id}":
    get:
      tags:
        - Broadcasts
      summary: Get a broadcast action
      operationId: Broadcasts_getActionDetails
      description: Returns information about a specific action within a broadcast.
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    put:
      tags:
        - Broadcasts
      summary: Update a broadcast action
      operationId: Broadcasts_updateActionContents
      description: "Update the contents of a broadcast action, including the body of messages or HTTP requests."
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}/actions/{action_id}/language/{language}":
    get:
      tags:
        - Broadcasts
      summary: Get a translation of a broadcast message
      operationId: Broadcasts_getTranslationMessage
      description: Returns information about a translation of message in a broadcast. The message is identified by the action_id.
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    put:
      tags:
        - Broadcasts
      summary: Update a translation of a broadcast message
      operationId: Broadcasts_updateTranslation
      description: "Update a translation of a specific broadcast action, including the body of messages or HTTP requests."
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}/actions/{action_id}/metrics/links":
    get:
      tags:
        - Broadcasts
      summary: Get broadcast action link metrics
      operationId: Broadcasts_getActionLinkMetrics
      description: "Returns link click metrics for an individual broadcast action. Unless you specify otherwise, the response contains data for the maximum period by days (45 days).\n\nYou cannot request fewer than 2 steps of any period (2 hours, 2 days, 2 weeks, or 2 months). For instance, ?period=days&steps=1 means two days - the 48 hours before the API request was made. ?period=days&steps=0 returns the same as the maximum of the period - ?period=days&steps=45. See the steps parameter below for the maximum count of each period."
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}/messages":
    get:
      tags:
        - Broadcasts
      summary: Get messages for a broadcast
      operationId: Broadcasts_getMessages
      description: "Returns information about the deliveries (instances of messages sent to individual people) sent from an API-triggered broadcast. Provide query parameters to refine the metrics you want to return.\n\nUse the start_ts and end_ts to find messages within a time range. If your request doesn’t include start_ts and end_ts parameters, we’ll return results for the 1 month period after the first trigger. If your start_ts and end_ts range is more than 12 months, we’ll return 12 months of data from the most recent timestamp in your request."
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}/metrics":
    get:
      tags:
        - Broadcasts
      summary: Get broadcast metrics
      operationId: Broadcasts_getMetrics
      description: "Returns a list of metrics for an individual broadcast in steps (days, weeks, etc). We return metrics from oldest to newest (i.e. the 0-index for any result is the oldest step/period).\n\nYou cannot request fewer than 2 steps of any period (2 hours, 2 days, 2 weeks, or 2 months). For instance, ?period=days&steps=1 means two days - the 48 hours before the API request was made. ?period=days&steps=0 returns the same as the maximum of the period - ?period=days&steps=45. See the steps parameter below for the maximum count of each period."
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}/metrics/links":
    get:
      tags:
        - Broadcasts
      summary: Get broadcast link metrics
      operationId: Broadcasts_getLinkMetrics
      description: "Returns metrics for link clicks within a broadcast, both in total and in series periods (days, weeks, etc). series metrics are ordered oldest to newest (i.e. the 0-index for any result is the oldest step/period).\n\nYou cannot request fewer than 2 steps of any period (2 hours, 2 days, 2 weeks, or 2 months). For instance, ?period=days&steps=1 means two days - the 48 hours before the API request was made. ?period=days&steps=0 returns the same as the maximum of the period - ?period=days&steps=45. See the steps parameter below for the maximum count of each period."
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/broadcasts/{broadcast_id}/triggers":
    get:
      tags:
        - Broadcasts
      summary: Get broadcast triggers
      operationId: Broadcasts_getTriggers
      description: Returns a list of the triggers for a broadcast.
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{broadcast_id}/triggers/{trigger_id}":
    get:
      tags:
        - Broadcasts
      summary: Get the status of a broadcast
      operationId: Broadcasts_getStatus
      description: After triggering a broadcast you can retrieve the status of that broadcast using a GET of the trigger_id. You can retrieve the trigger_id from Get broadcast triggers.
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
        - name: trigger_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{broadcast_id}/triggers/{trigger_id}/errors":
    get:
      tags:
        - Broadcasts
      summary: Get broadcast error descriptions
      operationId: Broadcasts_getBroadcastErrors
      description: "If your broadcast produced validation errors, this endpoint can help you better understand what went wrong. Broadcast errors are generally issues in your broadcast audience and associated."
      parameters:
        - name: broadcast_id
          in: path
          required: true
          schema:
            type: string
        - name: trigger_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/campaigns:
    get:
      tags:
        - Campaigns
      summary: List campaigns
      operationId: Campaigns_getList
      description: Returns a list of your campaigns and associated metadata.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}":
    get:
      tags:
        - Campaigns
      summary: Get a campaign
      operationId: Campaigns_getMetadata
      description: Returns metadata for an individual campaign.
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/actions":
    get:
      tags:
        - Campaigns
      summary: List campaign actions
      operationId: Campaigns_listActions
      description: "Returns the operations in a campaign workflow. Each object in the response represents an action or ‘tile’ in the campaign builder.\n\nThis endpoint returns up to 10 actions at a time. If there is another page of results, the response will include a next string. Pass this string as the start parameter to get the next page of results."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/actions/{action_id}":
    get:
      tags:
        - Campaigns
      summary: Get a campaign action
      operationId: Campaigns_getActionInfo
      description: Returns information about a specific action in a campaign.
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    put:
      tags:
        - Campaigns
      summary: Update a campaign action
      operationId: Campaigns_updateActionContents
      description: "Update the contents of a campaign action, including the body of messages and HTTP requests."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/actions/{action_id}/language/{language}":
    get:
      tags:
        - Campaigns
      summary: Get a translation of a campaign message
      operationId: Campaigns_getMessageTranslation
      description: Returns a translated version of a message in a campaign. The message is identified by the action_id.
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    put:
      tags:
        - Campaigns
      summary: Update a translation of a campaign message
      operationId: Campaigns_updateTranslation
      description: "Update the contents of a language variant of a campaign action, including the body of the messages and HTTP requests."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/actions/{action_id}/metrics":
    get:
      tags:
        - Campaigns
      summary: Get campaign action metrics
      operationId: Campaigns_getActionMetrics
      description: "Returns a list of metrics for an individual action both in total and in steps (days, weeks, etc) over a period of time. Stepped series metrics return from oldest to newest (i.e. the 0-index for any result is the oldest step/period).\n\nYou cannot request fewer than 2 steps of any period (2 hours, 2 days, 2 weeks, or 2 months). For instance, ?period=days&steps=1 means two days - the 48 hours before the API request was made. ?period=days&steps=0 returns the same as the maximum of the period - ?period=days&steps=45. See the steps parameter below for the maximum count of each period."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/actions/{action_id}/metrics/links":
    get:
      tags:
        - Campaigns
      summary: Get link metrics for an action
      operationId: Campaigns_getLinkMetricsForAction
      description: "Returns link click metrics for an individual action. Unless you specify otherwise, the response contains data for the maximum period by days (45 days).\n\nYou cannot request fewer than 2 steps of any period (2 hours, 2 days, 2 weeks, or 2 months). For instance, ?period=days&steps=1 means two days - the 48 hours before the API request was made. ?period=days&steps=0 returns the same as the maximum of the period - ?period=days&steps=45. See the steps parameter below for the maximum count of each period."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/journey_metrics":
    get:
      tags:
        - Campaigns
      summary: Get campaign journey metrics
      operationId: Campaigns_getJourneyMetrics
      description: "Returns a list of Journey Metrics for your campaign. These metrics show how many people triggered your campaign, were messaged, etc for the time period and “resolution” you set. You must provide the start, end, and resolution parameters or your request will return 400.\n\nMetrics in the response are arrays, and each index in the array corresponds to the resolution in your request. If you request metrics in days, the first result in each metric array is the first day of results and each successive increment represents another day.\n\nEach increment represents the number of journeys that started within a time period and eventually achieved a particular metric. For example, array index 0 for the converted metric represents the number of journeys that started on the first day/month of results that achieved a conversion."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/messages":
    get:
      tags:
        - Campaigns
      summary: Get campaign message metadata
      operationId: Campaigns_getMessageMetadata
      description: "Returns information about the deliveries (instances of messages sent to individual people) sent from a campaign. Provide query parameters to refine the metrics you want to return.\n\nUse the start_ts and end_ts to find messages within a time range. If your request doesn’t include start_ts and end_ts parameters, we’ll return the most recent 6 months of messages. If your start_ts and end_ts range is more than 12 months, we’ll return 12 months of data from the most recent timestamp in your request."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/metrics":
    get:
      tags:
        - Campaigns
      summary: Get campaign metrics
      operationId: Campaigns_getMetrics
      description: "Returns a list of metrics for an individual campaign in steps (days, weeks, etc). We return metrics from oldest to newest (i.e. the 0-index for any result is the oldest step/period).\n\nYou cannot request fewer than 2 steps of any period (2 hours, 2 days, 2 weeks, or 2 months). For instance, ?period=days&steps=1 means two days - the 48 hours before the API request was made. ?period=days&steps=0 returns the same as the maximum of the period - ?period=days&steps=45. See the steps parameter below for the maximum count of each period."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  "/v1/campaigns/{campaign_id}/metrics/links":
    get:
      tags:
        - Campaigns
      summary: Get campaign link metrics
      operationId: Campaigns_getLinkMetrics
      description: "Returns metrics for link clicks within a campaign, both in total and in series periods (days, weeks, etc). series metrics are ordered oldest to newest (i.e. the 0-index for any result is the oldest step/period).\n\nYou cannot request fewer than 2 steps of any period (2 hours, 2 days, 2 weeks, or 2 months). For instance, ?period=days&steps=1 means two days - the 48 hours before the API request was made. ?period=days&steps=0 returns the same as the maximum of the period - ?period=days&steps=45. See the steps parameter below for the maximum count of each period."
      parameters:
        - name: campaign_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
