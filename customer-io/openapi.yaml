  /v1/imports:
    post:
      tags:
        - Imports
      summary: Import items in bulk
      operationId: Imports_bulkUploadCsv
      description: "This endpoint lets you upload a CSV file containing people, events, objects, or relationships. It provides a handy way of adding and updating them in bulk. Uploading people, objects, or relationships is like performing an identify call for each row in your CSV; uploading events is like performing a track call.\n\nYou’ll need to provide us the public URL of your CSV as a part of this operation. We recommend that you host your CSVs from short-lived URLs. Ideally, your URLs will expire 2 hours after you initiate an import so that your customers’ information doesn’t remain publicly available after you’ve uploaded it to us.\n\nCheck out the CSV requirements based on what you’re importing: people, events, and objects or relationships."
